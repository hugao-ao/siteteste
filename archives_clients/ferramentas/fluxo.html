<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raio-X do Orçamento - MithraSF</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/layout.js" defer></script>
    <style>
        /* Specific styles for Fluxo de Caixa */
        .step-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar-container {
            height: 0.5rem;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            height: 100%;
            transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out;
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
        }

        .step-desc {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .step-total-label {
            font-size: 0.85rem;
            color: #9ca3af;
            text-align: right;
        }

        .step-total-value {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.75rem;
            color: white;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .add-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .add-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .item-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .delete-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            margin-left: 1rem;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-back {
            width: 33%;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-next {
            flex: 1;
            background-color: #eab308; /* Yellow-500 */
            color: black;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-next:hover {
            background-color: #ca8a04; /* Yellow-600 */
        }

        /* Result Styles */
        .result-card {
            border: 2px solid;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .result-card.positive {
            border-color: #22c55e; /* Green-500 */
            background-color: rgba(34, 197, 94, 0.1);
        }

        .result-card.negative {
            border-color: #ef4444; /* Red-500 */
            background-color: rgba(239, 68, 68, 0.1);
        }

        .result-title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 2rem;
        }

        .result-grid {
            display: grid;
            md:grid-template-columns: 1fr 1fr;
            gap: 2rem;
            text-align: left;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .summary-label { color: #9ca3af; }
        .summary-val-green { color: #4ade80; font-weight: bold; }
        .summary-val-blue { color: #60a5fa; font-weight: bold; }
        .summary-val-yellow { color: #facc15; font-weight: bold; }
        .summary-val-red { color: #f87171; font-weight: bold; }

        .final-balance-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Enhanced Projection Box Styles */
        .projection-box {
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            transition: transform 0.3s ease;
        }

        .projection-box:hover {
            transform: scale(1.02);
        }

        /* Status-specific styles for Projection Box */
        .projection-box.status-red {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.2), rgba(153, 27, 27, 0.4));
            border-color: #ef4444;
        }

        .projection-box.status-yellow {
            background: linear-gradient(145deg, rgba(234, 179, 8, 0.2), rgba(161, 98, 7, 0.4));
            border-color: #eab308;
        }

        .projection-box.status-green {
            background: linear-gradient(145deg, rgba(34, 197, 94, 0.2), rgba(21, 128, 61, 0.4));
            border-color: #22c55e;
        }

        .projection-title { 
            font-size: 1.2rem; 
            font-weight: 600; 
            color: white; 
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .projection-value { 
            font-size: 3rem; 
            font-weight: 800; 
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .projection-desc { 
            font-size: 1rem; 
            color: rgba(255, 255, 255, 0.9); 
            line-height: 1.5;
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background-color: rgba(0,0,0,0.3);
            color: white;
        }

        .alert-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
        }

        .alert-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .alert-title { font-size: 1.2rem; font-weight: bold; color: white; margin-bottom: 0.5rem; }
        .alert-text { color: #9ca3af; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .restart-btn {
            width: 100%;
            background: none;
            border: none;
            color: #9ca3af;
            padding: 1rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .restart-btn:hover { color: white; }

    </style>
</head>
<body>
    <!-- Sidebar Container (Injected by layout.js) -->
    <div id="sidebar-container" class="sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <header class="flex items-center gap-4 mb-8">
                <a href="../ferramentas.html" class="text-gray-400 hover:text-white text-xl">←</a>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-blue-400 text-2xl">💰</span>
                        <h1 class="text-2xl font-bold m-0">Raio-X do Orçamento</h1>
                    </div>
                    <p class="text-gray-400 text-sm">Diagnóstico financeiro detalhado e projeção de fluxo de caixa.</p>
                </div>
                <button id="mobile-toggle" class="mobile-toggle ml-auto md:hidden">☰</button>
            </header>

            <!-- Step Content -->
            <div id="step-container">
                <!-- Content injected by JS -->
            </div>

        </div>
    </main>

    <script>
        // State
        let currentStep = 1;
        const data = {
            incomes: [],
            investments: [],
            fixedExpenses: [],
            variableExpenses: []
        };

        // Configuration for each step
        const stepsConfig = {
            1: {
                title: "Fontes de Renda",
                desc: "Registre todas as entradas mensais (salários, pró-labore, aluguéis, dividendos).",
                placeholder: "Ex: Salário Mensal",
                color: "bg-green-500",
                textColor: "text-green-500",
                listKey: "incomes"
            },
            2: {
                title: "Aportes e Investimentos",
                desc: "Valores destinados à construção de patrimônio (não inclua reserva de emergência se for uso corrente).",
                placeholder: "Ex: Aporte Tesouro Direto",
                color: "bg-blue-500",
                textColor: "text-blue-500",
                listKey: "investments"
            },
            3: {
                title: "Despesas Fixas",
                desc: "Compromissos financeiros recorrentes e obrigatórios (Moradia, Educação, Seguros).",
                placeholder: "Ex: Aluguel / Condomínio",
                color: "bg-yellow-500",
                textColor: "text-yellow-500",
                listKey: "fixedExpenses"
            },
            4: {
                title: "Despesas Variáveis",
                desc: "Gastos discricionários e oscilantes (Lazer, Alimentação fora, Transporte por app).",
                placeholder: "Ex: Restaurantes / Ifood",
                color: "bg-red-500",
                textColor: "text-red-500",
                listKey: "variableExpenses"
            }
        };

        // Helper Functions
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        }

        function getTotal(list) {
            return list.reduce((acc, item) => acc + item.value, 0);
        }

        function addItem(name, value) {
            if (!name || !value) return;
            const key = stepsConfig[currentStep].listKey;
            data[key].push({ name, value: parseFloat(value) });
            renderStep();
        }

        function removeItem(index) {
            const key = stepsConfig[currentStep].listKey;
            data[key].splice(index, 1);
            renderStep();
        }

        function nextStep() {
            if (currentStep < 4) {
                currentStep++;
                renderStep();
            } else {
                renderResult();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                renderStep();
            }
        }

        function restart() {
            currentStep = 1;
            data.incomes = [];
            data.investments = [];
            data.fixedExpenses = [];
            data.variableExpenses = [];
            renderStep();
        }

        // Render Functions
        function renderStep() {
            const config = stepsConfig[currentStep];
            const list = data[config.listKey];
            const total = getTotal(list);
            const progress = (currentStep / 4) * 100;

            const container = document.getElementById('step-container');
            
            container.innerHTML = `
                <div class="step-card">
                    <div class="progress-bar-container">
                        <div class="progress-bar ${config.color}" style="width: ${progress}%"></div>
                    </div>

                    <div class="step-header">
                        <div>
                            <h2 class="step-title">${config.title}</h2>
                            <p class="step-desc">${config.desc}</p>
                        </div>
                        <div>
                            <div class="step-total-label">Total desta etapa</div>
                            <div class="step-total-value ${config.textColor}">${formatCurrency(total)}</div>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Descrição</label>
                            <input type="text" id="item-name" placeholder="${config.placeholder}">
                        </div>
                        <div class="input-group">
                            <label>Valor (R$)</label>
                            <input type="number" id="item-value" placeholder="0,00">
                        </div>
                        <button onclick="addItem(document.getElementById('item-name').value, document.getElementById('item-value').value)" class="add-btn">
                            <span class="text-xl">+</span>
                        </button>
                    </div>

                    <div class="item-list">
                        ${list.map((item, index) => `
                            <div class="list-item">
                                <span>${item.name}</span>
                                <div class="flex items-center">
                                    <span class="font-bold">${formatCurrency(item.value)}</span>
                                    <button onclick="removeItem(${index})" class="delete-btn">🗑️</button>
                                </div>
                            </div>
                        `).join('')}
                        ${list.length === 0 ? '<div class="text-center text-gray-600 py-4">Nenhum item adicionado ainda.</div>' : ''}
                    </div>

                    <div class="nav-buttons">
                        <button onclick="prevStep()" class="btn-back" ${currentStep === 1 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>Voltar</button>
                        <button onclick="nextStep()" class="btn-next ${config.color}">
                            ${currentStep === 4 ? 'Gerar Diagnóstico' : 'Próxima Etapa'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderResult() {
            const totalIncome = getTotal(data.incomes);
            const totalInvest = getTotal(data.investments);
            const totalFixed = getTotal(data.fixedExpenses);
            const totalVariable = getTotal(data.variableExpenses);
            
            const totalExpenses = totalFixed + totalVariable + totalInvest;
            const balance = totalIncome - totalExpenses;
            const yearlyProjection = balance * 12;
            const isPositive = balance >= 0;

            // Calculate surplus percentage relative to total income
            // Avoid division by zero
            const surplusPercentage = totalIncome > 0 ? (balance / totalIncome) * 100 : 0;
            
            // Logic for 2.5% Rule
            // 1. Deficit (Negative Balance) -> RED
            // 2. Surplus > 2.5% -> YELLOW (Inefficiency Warning)
            // 3. Surplus between 0% and 2.5% -> GREEN (Optimized)
            
            let statusColor, statusTitle, statusDesc, boxClass, badgeText;

            if (!isPositive) {
                // CASE 1: DEFICIT (RED)
                statusColor = "text-red-500";
                boxClass = "status-red";
                statusTitle = "DÉFICIT PROJETADO (ANUAL)";
                badgeText = "RISCO DE INSOLVÊNCIA";
                statusDesc = `Diagnóstico Crítico: Seu fluxo de caixa apresenta um déficit estrutural. A projeção indica um acúmulo de dívida de <strong>${formatCurrency(Math.abs(yearlyProjection))}</strong> em 12 meses. Recomendação imediata: revisão de custos fixos e variáveis.`;
            } else if (surplusPercentage > 2.5) {
                // CASE 2: SURPLUS > 2.5% (YELLOW - INEFFICIENCY)
                statusColor = "text-yellow-400";
                boxClass = "status-yellow";
                statusTitle = "CAPITAL OCIOSO (ANUAL)";
                badgeText = "INEFICIÊNCIA DE ALOCAÇÃO";
                statusDesc = `Diagnóstico de Eficiência: Identificamos <strong>${surplusPercentage.toFixed(1)}%</strong> de capital não alocado. Isso representa um custo de oportunidade sobre <strong>${formatCurrency(yearlyProjection)}</strong> anuais. Recomendação: Aumentar aportes em investimentos produtivos.`;
            } else {
                // CASE 3: OPTIMIZED (GREEN)
                statusColor = "text-green-400";
                boxClass = "status-green";
                statusTitle = "POTENCIAL DE ACUMULAÇÃO";
                badgeText = "ALOCAÇÃO OTIMIZADA";
                statusDesc = `Diagnóstico Positivo: Sua estrutura de capital está eficiente, com margem de erro de apenas <strong>${surplusPercentage.toFixed(1)}%</strong>. O fluxo de caixa está devidamente direcionado para despesas e investimentos, maximizando o potencial de juros compostos.`;
            }

            const container = document.getElementById('step-container');

            container.innerHTML = `
                <div class="result-card ${isPositive ? 'positive' : 'negative'}">
                    <h2 class="result-title">Diagnóstico Financeiro</h2>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <!-- Left Column: Summary -->
                        <div class="space-y-2">
                            <div class="summary-row">
                                <span class="summary-label">Receita Total</span>
                                <span class="summary-val-green">${formatCurrency(totalIncome)}</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Aportes (Investimentos)</span>
                                <span class="summary-val-blue">-${formatCurrency(totalInvest)}</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Despesas Fixas</span>
                                <span class="summary-val-yellow">-${formatCurrency(totalFixed)}</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">Despesas Variáveis</span>
                                <span class="summary-val-red">-${formatCurrency(totalVariable)}</span>
                            </div>
                            
                            <div class="final-balance-row">
                                <span>Resultado Líquido Mensal</span>
                                <span class="${isPositive ? 'text-green-400' : 'text-red-400'}">${formatCurrency(balance)}</span>
                            </div>
                        </div>

                        <!-- Right Column: Projection Box (Focal Point) -->
                        <div class="projection-box ${boxClass}">
                            <span class="status-badge">${badgeText}</span>
                            <div class="projection-title">${statusTitle}</div>
                            <div class="projection-value text-white">
                                ${formatCurrency(Math.abs(yearlyProjection))}
                            </div>
                            <div class="projection-desc">
                                ${statusDesc}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center gap-4 mt-8">
                    <button onclick="restart()" class="restart-btn">Nova Análise</button>
                </div>
            `;
        }

        // Initialize
        renderStep();

    </script>
</body>
</html>
