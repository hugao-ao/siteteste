<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Oráculo Financeiro - MithraSF</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/layout.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Specific styles for Oraculo */
        .input-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-yellow { color: var(--primary-color); }
        .text-blue { color: #60a5fa; }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.75rem;
            color: white;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .toggle-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .toggle-btn {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: #9ca3af;
        }

        .toggle-btn.active {
            background-color: var(--primary-color);
            color: black;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary-color);
            color: black;
            font-weight: bold;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            padding: 0.75rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.2); }

        .goal-list {
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .goal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .goal-remove {
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
        }

        .chart-container {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            height: 400px;
            position: relative;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .summary-box {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
        }

        .summary-label { font-size: 0.85rem; color: #9ca3af; }
        .summary-value { font-size: 1.25rem; font-weight: bold; color: white; }
        .text-gold { color: var(--primary-color); }

        /* Checkbox style */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #9ca3af;
            cursor: pointer;
        }
        
        .checkbox-wrapper input {
            width: auto;
            cursor: pointer;
        }

        /* Verdict Box Style */
        .verdict-box {
            margin-top: 1.5rem;
            background-color: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
        }
        .verdict-title {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .verdict-text {
            color: #d1d5db;
            font-size: 0.95rem;
            line-height: 1.5;
        }

    </style>
</head>
<body>
    <!-- Sidebar Container (Injected by layout.js) -->
    <div id="sidebar-container" class="sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <header class="flex items-center gap-4 mb-8">
                <a href="../ferramentas.html" class="text-gray-400 hover:text-white text-xl">←</a>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-yellow-500 text-2xl">📈</span>
                        <h1 class="text-2xl font-bold m-0">O Oráculo Financeiro</h1>
                    </div>
                    <p class="text-gray-400 text-sm">Projeção de patrimônio e análise de viabilidade de objetivos.</p>
                </div>
                <button id="mobile-toggle" class="mobile-toggle ml-auto md:hidden">☰</button>
            </header>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Inputs Column -->
                <div class="lg:col-span-1">
                    <!-- Parameters Card -->
                    <div class="input-card">
                        <div class="card-header text-yellow">Parâmetros de Acumulação</div>
                        
                        <div class="input-group">
                            <label>Patrimônio Atual (R$)</label>
                            <input type="text" id="currentWealth" placeholder="0,00" oninput="formatCurrencyInput(this)">
                        </div>

                        <div class="input-group">
                            <label>Aporte Mensal (R$)</label>
                            <input type="text" id="monthlyContribution" placeholder="0,00" oninput="formatCurrencyInput(this)">
                        </div>

                        <div class="input-group">
                            <label>Rentabilidade Anual Estimada (%)</label>
                            <input type="number" id="interestRate" placeholder="Ex: 10">
                        </div>

                        <div class="input-group">
                            <div class="flex justify-between items-center mb-2">
                                <label style="margin:0">Horizonte de Tempo</label>
                                <div class="toggle-group">
                                    <button class="toggle-btn active" onclick="setTimeUnit('years')" id="btn-years">Anos</button>
                                    <button class="toggle-btn" onclick="setTimeUnit('months')" id="btn-months">Meses</button>
                                </div>
                            </div>
                            <input type="number" id="duration" placeholder="Ex: 20" value="10">
                        </div>
                    </div>

                    <!-- Goals Card -->
                    <div class="input-card">
                        <div class="card-header text-blue">Eventos de Saque (Objetivos)</div>
                        
                        <div class="input-group">
                            <label>Descrição do Evento</label>
                            <input type="text" id="goalName" placeholder="Ex: Trocar de Carro">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label>Valor do Saque (R$)</label>
                                <input type="text" id="goalValue" placeholder="0,00" oninput="formatCurrencyInput(this)">
                            </div>
                            <div class="input-group">
                                <label id="goalTimeLabel">Ano do Evento</label>
                                <input type="number" id="goalTime" placeholder="Ex: 5">
                            </div>
                        </div>

                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="goalRecurring">
                            Evento Recorrente (Anual)?
                        </label>

                        <button onclick="addGoal()" class="btn-secondary">
                            <span>+</span> Registrar Evento
                        </button>

                        <div id="goalsList" class="goal-list">
                            <!-- Goals injected here -->
                        </div>
                    </div>

                    <button onclick="calculate()" class="btn-primary">
                        Atualizar Projeção
                    </button>
                </div>

                <!-- Chart Column -->
                <div class="lg:col-span-2">
                    <div class="chart-container">
                        <canvas id="wealthChart"></canvas>
                    </div>

                    <div class="summary-grid">
                        <div class="summary-box">
                            <div class="summary-label">Patrimônio Final Projetado</div>
                            <div class="summary-value text-gold" id="finalWealth">R$ 0,00</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-label">Total Aportado (Principal)</div>
                            <div class="summary-value" id="totalInvested">R$ 0,00</div>
                        </div>
                    </div>

                    <!-- Verdict Box -->
                    <div class="verdict-box" id="verdictBox" style="display:none;">
                        <div class="verdict-title">
                            <span>🔮</span> Parecer do Oráculo
                        </div>
                        <div class="verdict-text" id="verdictText">
                            <!-- Analysis text injected here -->
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        let timeUnit = 'years';
        let goals = [];
        let chartInstance = null;

        // Helper Functions
        function formatCurrency(value) {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function parseCurrencyInput(value) {
            if (!value) return 0;
            return parseFloat(value.replace(/\./g, '').replace(',', '.'));
        }

        function formatCurrencyInput(input) {
            let value = input.value.replace(/\D/g, '');
            value = (parseFloat(value) / 100).toFixed(2) + '';
            value = value.replace('.', ',');
            value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
            if (value === 'NaN') value = '';
            input.value = value;
        }

        function setTimeUnit(unit) {
            timeUnit = unit;
            document.getElementById('btn-years').className = `toggle-btn ${unit === 'years' ? 'active' : ''}`;
            document.getElementById('btn-months').className = `toggle-btn ${unit === 'months' ? 'active' : ''}`;
            document.getElementById('goalTimeLabel').innerText = unit === 'years' ? 'Ano' : 'Mês';
            document.getElementById('duration').placeholder = unit === 'years' ? 'Ex: 20' : 'Ex: 240';
            calculate();
        }

        function addGoal() {
            const name = document.getElementById('goalName').value;
            const value = parseCurrencyInput(document.getElementById('goalValue').value);
            const time = parseInt(document.getElementById('goalTime').value);
            const isRecurring = document.getElementById('goalRecurring').checked;

            if (name && value > 0 && time > 0) {
                goals.push({ name, value, time, isRecurring });
                
                // Reset inputs
                document.getElementById('goalName').value = '';
                document.getElementById('goalValue').value = '';
                document.getElementById('goalTime').value = '';
                document.getElementById('goalRecurring').checked = false;
                
                renderGoals();
                calculate();
            }
        }

        function removeGoal(index) {
            goals.splice(index, 1);
            renderGoals();
            calculate();
        }

        function renderGoals() {
            const container = document.getElementById('goalsList');
            container.innerHTML = goals.map((g, i) => `
                <div class="goal-item">
                    <div>
                        <span class="font-bold">${g.name}</span>
                        <span class="text-gray-400 text-xs ml-2">
                            (${timeUnit === 'years' ? 'Ano' : 'Mês'} ${g.time}${g.isRecurring ? ', Anual' : ''})
                        </span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-red-400 font-bold">-${formatCurrency(g.value)}</span>
                        <button onclick="removeGoal(${i})" class="goal-remove">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function calculate() {
            const currentWealth = parseCurrencyInput(document.getElementById('currentWealth').value);
            const monthlyContribution = parseCurrencyInput(document.getElementById('monthlyContribution').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value.replace(',', '.') || 0);
            const duration = parseInt(document.getElementById('duration').value || 10);

            const monthlyRate = Math.pow(1 + interestRate / 100, 1 / 12) - 1;
            const totalMonths = timeUnit === 'years' ? duration * 12 : duration;

            let current = currentWealth;
            const labels = [];
            const dataPoints = [];

            // Initial point
            labels.push('Início');
            dataPoints.push(current);

            for (let month = 1; month <= totalMonths; month++) {
                // Compound interest + contribution
                current = current * (1 + monthlyRate) + monthlyContribution;

                // Apply goals
                goals.forEach(g => {
                    const goalTime = g.time;
                    const isGoalMonth = timeUnit === 'years' 
                        ? (month % 12 === 0 && Math.floor(month / 12) === goalTime)
                        : month === goalTime;

                    if (isGoalMonth || (g.isRecurring && month % 12 === 0)) {
                        // Simplified recurring logic: apply every year if recurring, or on specific match
                        if (g.isRecurring || isGoalMonth) {
                            current -= g.value;
                        }
                    }
                });

                // Add data point
                if (timeUnit === 'years') {
                    if (month % 12 === 0) {
                        labels.push(`Ano ${month/12}`);
                        dataPoints.push(current);
                    }
                } else {
                    labels.push(`Mês ${month}`);
                    dataPoints.push(current);
                }
            }

            // Update Summary
            document.getElementById('finalWealth').innerText = formatCurrency(current);
            
            const totalInvested = currentWealth + (monthlyContribution * totalMonths);
            document.getElementById('totalInvested').innerText = formatCurrency(totalInvested);

            // Generate Verdict
            generateVerdict(current, totalInvested, duration, interestRate);

            renderChart(labels, dataPoints);
        }

        function generateVerdict(finalWealth, totalInvested, duration, interestRate) {
            const verdictBox = document.getElementById('verdictBox');
            const verdictText = document.getElementById('verdictText');
            
            if (finalWealth <= 0) {
                verdictBox.style.display = 'none';
                return;
            }

            verdictBox.style.display = 'block';
            
            const profit = finalWealth - totalInvested;
            const profitPercentage = totalInvested > 0 ? (profit / totalInvested) * 100 : 0;
            const multiplier = totalInvested > 0 ? (finalWealth / totalInvested).toFixed(1) : 0;

            let analysis = `
                <strong>Análise de Eficiência:</strong> Ao final de ${duration} ${timeUnit === 'years' ? 'anos' : 'meses'}, 
                seus juros compostos terão gerado <strong>${formatCurrency(profit)}</strong> de lucro passivo. 
                Isso significa que seu dinheiro trabalhou por você e multiplicou seu capital investido em <strong>${multiplier}x</strong>.
            `;

            if (interestRate < 6) {
                analysis += `<br><br>⚠️ <strong>Alerta de Rentabilidade:</strong> Sua taxa de ${interestRate}% ao ano está conservadora. 
                Aumentar a rentabilidade média para 10% poderia elevar seu patrimônio final significativamente.`;
            } else if (interestRate > 15) {
                analysis += `<br><br>⚠️ <strong>Alerta de Risco:</strong> Uma taxa de ${interestRate}% ao ano exige exposição a riscos elevados. 
                Certifique-se de que sua carteira está diversificada para proteger este patrimônio.`;
            }

            verdictText.innerHTML = analysis;
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('wealthChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(212, 175, 55, 0.5)'); // Gold with opacity
            gradient.addColorStop(1, 'rgba(212, 175, 55, 0)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Patrimônio Acumulado',
                        data: data,
                        borderColor: '#D4AF37', // Gold
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#D4AF37',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return formatCurrency(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#9ca3af', maxTicksLimit: 10 }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { 
                                color: '#9ca3af',
                                callback: function(value) {
                                    return 'R$ ' + (value / 1000).toFixed(0) + 'k';
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // Initial render
        calculate();

        // Auto-calculate on input change (debounced)
        let timeout;
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(calculate, 500);
            });
        });

    </script>
</body>
</html>
