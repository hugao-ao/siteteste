<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos e Direitos - MithraSF</title>
<link rel="stylesheet" href="../assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/importar-diagnostico.js"></script>
<script src="../assets/layout.js" defer></script>
<style>
:root {
  --bg: #021C0E;
  --card: #052614;
  --card2: #0A3520;
  --fg: #F2E8C9;
  --muted: #A0B8A6;
  --primary: #D4AF37;
  --primary-dim: rgba(212,175,55,0.15);
  --border: rgba(212,175,55,0.2);
  --green: #22c55e;
  --red: #ef4444;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --orange: #fb923c;
  --teal: #14b8a6;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LAYOUT ── */
.page-header { text-align: center; padding: 2rem 1rem 1rem; }
.page-header h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 0.3rem; }
.page-header p { color: var(--muted); font-size: 0.85rem; }

/* ── TABS ── */
.tabs { display: flex; justify-content: center; gap: 0.5rem; margin: 1rem auto; max-width: 600px; padding: 0 1rem; }
.tab-btn { flex: 1; padding: 0.7rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
.tab-btn:hover { border-color: var(--primary); color: var(--fg); }
.tab-btn.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.tab-content { display: none; padding: 1rem; max-width: 900px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── CARDS DE PRODUTO ── */
.produto-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; transition: border-color 0.2s; }
.produto-card:hover { border-color: var(--primary); }
.produto-card-header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; cursor: pointer; }
.produto-card-header .chevron { color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
.produto-card.open .produto-card-header .chevron { transform: rotate(180deg); }
.produto-card-title { font-weight: 700; color: #fff; font-size: 0.95rem; flex: 1; }
.produto-card-meta { font-size: 0.75rem; color: var(--muted); }
.produto-card-actions { display: flex; gap: 0.4rem; }
.produto-card-actions button { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.produto-card-actions button:hover { border-color: var(--primary); color: var(--primary); }
.produto-card-actions button.danger { border-color: rgba(239,68,68,0.3); color: var(--red); }
.produto-card-actions button.danger:hover { background: rgba(239,68,68,0.1); }
.produto-card-body { display: none; padding: 0 1.25rem 1rem; border-top: 1px solid var(--border); }
.produto-card.open .produto-card-body { display: block; padding-top: 1rem; }

/* ── DIREITOS DENTRO DO CARD ── */
.direitos-section { margin-top: 0.75rem; }
.direitos-section h4 { font-size: 0.8rem; color: var(--primary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
.direito-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.02); border-radius: 6px; margin-bottom: 0.4rem; border: 1px solid rgba(255,255,255,0.04); }
.direito-item .direito-nome { flex: 1; font-size: 0.85rem; }
.direito-item .direito-valor { font-size: 0.8rem; color: var(--green); font-weight: 600; }
.direito-item .direito-tag { font-size: 0.65rem; background: var(--primary-dim); color: var(--primary); padding: 0.15rem 0.5rem; border-radius: 4px; }
.direito-item .direito-actions { display: flex; gap: 0.3rem; }
.direito-item .direito-actions button { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 4px; transition: all 0.15s; }
.direito-item .direito-actions button:hover { color: var(--primary); background: var(--primary-dim); }
.direito-item .direito-actions button.danger:hover { color: var(--red); background: rgba(239,68,68,0.1); }
.btn-add-direito { background: transparent; border: 1px dashed var(--border); color: var(--muted); border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; width: 100%; }
.btn-add-direito:hover { border-color: var(--primary); color: var(--primary); }

/* ── PRODUTO INFO ── */
.produto-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 0.75rem; }
.produto-info .info-item { font-size: 0.8rem; }
.produto-info .info-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3px; }
.produto-info .info-value { color: var(--fg); font-weight: 600; margin-top: 0.15rem; }

/* ── CONSOLIDADO ── */
.consolidado-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.consolidado-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.consolidado-card h3 { font-size: 0.9rem; color: var(--primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
.consolidado-card .direito-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
.consolidado-card .direito-row:last-child { border-bottom: none; }
.consolidado-card .direito-row .fonte { font-size: 0.7rem; color: var(--muted); }
.consolidado-card .direito-row .valor { color: var(--green); font-weight: 600; font-size: 0.8rem; }

/* ── RESUMO TOPO ── */
.resumo-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
.resumo-stat { text-align: center; flex: 1; min-width: 100px; }
.resumo-stat .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
.resumo-stat .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 0.2rem; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.5; }
.empty-state p { font-size: 0.9rem; line-height: 1.5; }

/* ── BOTÕES ── */
.btn-new { background: linear-gradient(135deg, var(--primary), #b8962e); color: #000; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-new:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,0.4); }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.header-bar h2 { margin: 0; color: var(--primary); font-size: 1.1rem; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.modal h2 { color: var(--primary); font-size: 1.1rem; margin-bottom: 1.5rem; }
.modal label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.3px; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 0.6rem 0.8rem; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 0.9rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--primary); }
.modal textarea { resize: vertical; min-height: 60px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem; }
.modal-footer button { padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-cancel:hover { border-color: var(--fg); color: var(--fg); }
.btn-confirm { background: var(--primary); border: none; color: #000; font-weight: 700; }
.btn-confirm:hover { box-shadow: 0 4px 12px rgba(212,175,55,0.4); }
.btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }

/* ── BUSCA ── */
.search-bar { margin-bottom: 1rem; }
.search-bar input { width: 100%; padding: 0.7rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 0.9rem; outline: none; }
.search-bar input:focus { border-color: var(--primary); }
.search-bar input::placeholder { color: var(--muted); }

/* ── SAVE BUTTON ── */
.btn-save-global { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: linear-gradient(135deg, #d4af37, #b8962e); color: #000; border: none; border-radius: 12px; padding: 12px 24px; font-size: 0.95rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(212,175,55,0.4); display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
.btn-save-global:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(212,175,55,0.6); }
.btn-save-global.saved { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }

@media (max-width: 768px) {
  .tabs { flex-direction: column; }
  .consolidado-grid { grid-template-columns: 1fr; }
  .produto-info { grid-template-columns: 1fr 1fr; }
  .resumo-bar { flex-direction: column; gap: 0.75rem; }
}
</style>
</head>
<body>
<div id="sidebar-container" class="sidebar"></div>
<main class="main-content">

<!-- ── HEADER ── -->
<header class="page-header">
  <h1>Produtos e Direitos</h1>
  <p>Mapeie todos os produtos contratados e descubra os direitos do seu cliente</p>
</header>

<!-- ── TABS ── -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('produtos')">Produtos</button>
  <button class="tab-btn" onclick="switchTab('consolidado')">Visão Consolidada</button>
</div>

<!-- ── TAB: PRODUTOS ── -->
<div class="tab-content active" id="tab-produtos">
  <div class="header-bar">
    <h2>Produtos do Cliente</h2>
    <button class="btn-new" onclick="openProdutoModal()">+ Novo Produto</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search-produtos" placeholder="Buscar produto por nome, tipo ou instituição..." oninput="renderProdutos()">
  </div>
  <div id="produtos-container">
    <div class="empty-state" id="empty-produtos">
      <div class="icon">📦</div>
      <p>Nenhum produto cadastrado ainda.<br>Clique em <strong>+ Novo Produto</strong> para começar.</p>
    </div>
  </div>
</div>

<!-- ── TAB: CONSOLIDADO ── -->
<div class="tab-content" id="tab-consolidado">
  <div class="header-bar">
    <h2>Visão Consolidada de Direitos</h2>
  </div>
  <div class="search-bar">
    <input type="text" id="search-consolidado" placeholder="Buscar direito por nome, categoria ou produto..." oninput="renderConsolidado()">
  </div>
  <div id="resumo-container"></div>
  <div id="consolidado-container"></div>
</div>

<!-- ── MODAL: PRODUTO ── -->
<div class="modal-overlay" id="modal-produto">
  <div class="modal">
    <h2 id="modal-produto-title">Novo Produto</h2>
    <label>Nome do Produto *</label>
    <input type="text" id="mp_nome" placeholder="Ex: Seguro de Vida Porto, Cartão Amex Platinum...">
    <label>Tipo / Categoria</label>
    <input type="text" id="mp_tipo" placeholder="Ex: Seguro de Vida, Cartão, Previdência, Consórcio...">
    <label>Instituição / Seguradora</label>
    <input type="text" id="mp_instituicao" placeholder="Ex: Porto Seguro, Nubank, Bradesco...">
    <label>Custo Mensal (R$)</label>
    <input type="text" id="mp_custo" placeholder="Ex: 150,00" oninput="fmtCur(this)">
    <label>Vigência / Vencimento</label>
    <input type="date" id="mp_vigencia">
    <label>Observações</label>
    <textarea id="mp_obs" placeholder="Anotações livres sobre o produto..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeProdutoModal()">Cancelar</button>
      <button class="btn-confirm" onclick="salvarProduto()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: DIREITO ── -->
<div class="modal-overlay" id="modal-direito">
  <div class="modal">
    <h2 id="modal-direito-title">Novo Direito</h2>
    <label>Descrição do Direito *</label>
    <input type="text" id="md_nome" placeholder="Ex: Cobertura por Morte, Sala VIP, Assistência 24h...">
    <label>Valor / Limite (se aplicável)</label>
    <input type="text" id="md_valor" placeholder="Ex: 500.000,00 ou Ilimitado" oninput="fmtCur(this)">
    <label>Categoria / Tag</label>
    <input type="text" id="md_categoria" placeholder="Ex: Cobertura, Assistência, Benefício, Desconto...">
    <label>Detalhes / Condições</label>
    <textarea id="md_detalhes" placeholder="Condições, carências, limites de uso..."></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDireitoModal()">Cancelar</button>
      <button class="btn-confirm" onclick="salvarDireito()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: CONFIRMAR EXCLUSÃO ── -->
<div class="modal-overlay" id="modal-del">
  <div class="modal">
    <h2>Confirmar Exclusão</h2>
    <p id="modal-del-msg" style="color:var(--muted);margin-bottom:1.5rem;"></p>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDelModal()">Cancelar</button>
      <button class="btn-danger" onclick="confirmDel()">Excluir</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════════════════
var produtos = []; // [{id, nome, tipo, instituicao, custo, vigencia, obs, direitos: [{id, nome, valor, categoria, detalhes}]}]
var _editingProdutoId = null;
var _editingDireitoId = null;
var _editingDireitoProdutoId = null;
var _delCallback = null;

// ═══════════════════════════════════════════════════════════════════════════
//  UTILITÁRIOS
// ═══════════════════════════════════════════════════════════════════════════
function fmtCur(el) {
  var v = el.value.replace(/\D/g, '');
  if (!v) { el.value = ''; return; }
  v = (parseInt(v, 10) / 100).toFixed(2);
  el.value = parseFloat(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function parseCur(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/\./g, '').replace(',', '.')) || 0;
}
function escHtml(str) { var div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
function genId() { return Date.now() + Math.floor(Math.random() * 1000); }

// ═══════════════════════════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  if (tab === 'produtos') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('tab-produtos').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('tab-consolidado').classList.add('active');
    renderConsolidado();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDERIZAÇÃO: PRODUTOS
// ═══════════════════════════════════════════════════════════════════════════
function renderProdutos() {
  var container = document.getElementById('produtos-container');
  var empty = document.getElementById('empty-produtos');
  var search = (document.getElementById('search-produtos').value || '').toLowerCase();
  
  // Filtrar
  var filtered = produtos.filter(function(p) {
    if (!search) return true;
    return (p.nome || '').toLowerCase().includes(search) ||
           (p.tipo || '').toLowerCase().includes(search) ||
           (p.instituicao || '').toLowerCase().includes(search);
  });
  
  // Limpar cards existentes
  container.querySelectorAll('.produto-card').forEach(function(el) { el.remove(); });
  
  if (filtered.length === 0) {
    empty.style.display = produtos.length === 0 ? 'block' : 'block';
    if (produtos.length > 0 && search) {
      empty.innerHTML = '<div class="icon">🔍</div><p>Nenhum produto encontrado para essa busca.</p>';
    } else {
      empty.innerHTML = '<div class="icon">📦</div><p>Nenhum produto cadastrado ainda.<br>Clique em <strong>+ Novo Produto</strong> para começar.</p>';
    }
    return;
  }
  
  empty.style.display = 'none';
  
  filtered.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'produto-card';
    card.id = 'produto-' + p.id;
    
    var nDireitos = (p.direitos || []).length;
    var custoStr = p.custo ? 'R$ ' + parseCur(p.custo).toLocaleString('pt-BR', {minimumFractionDigits:2}) + '/mês' : '';
    
    var html = '<div class="produto-card-header" onclick="toggleProduto(' + p.id + ')">';
    html += '<div class="chevron">&#9660;</div>';
    html += '<div class="produto-card-title">' + escHtml(p.nome) + '</div>';
    html += '<div class="produto-card-meta">' + nDireitos + ' direito' + (nDireitos !== 1 ? 's' : '') + (custoStr ? ' · ' + custoStr : '') + '</div>';
    html += '<div class="produto-card-actions" onclick="event.stopPropagation()">';
    html += '<button onclick="editProduto(' + p.id + ')">✏️ Editar</button>';
    html += '<button class="danger" onclick="deleteProduto(' + p.id + ')">🗑️</button>';
    html += '</div></div>';
    
    // Body
    html += '<div class="produto-card-body">';
    
    // Info do produto
    html += '<div class="produto-info">';
    if (p.tipo) html += '<div class="info-item"><div class="info-label">Tipo</div><div class="info-value">' + escHtml(p.tipo) + '</div></div>';
    if (p.instituicao) html += '<div class="info-item"><div class="info-label">Instituição</div><div class="info-value">' + escHtml(p.instituicao) + '</div></div>';
    if (p.custo) html += '<div class="info-item"><div class="info-label">Custo Mensal</div><div class="info-value">R$ ' + escHtml(p.custo) + '</div></div>';
    if (p.vigencia) html += '<div class="info-item"><div class="info-label">Vigência</div><div class="info-value">' + new Date(p.vigencia + 'T00:00:00').toLocaleDateString('pt-BR') + '</div></div>';
    html += '</div>';
    
    if (p.obs) html += '<p style="font-size:0.8rem;color:var(--muted);font-style:italic;margin-bottom:0.75rem;">' + escHtml(p.obs) + '</p>';
    
    // Direitos
    html += '<div class="direitos-section">';
    html += '<h4>Direitos / Benefícios</h4>';
    
    if (p.direitos && p.direitos.length > 0) {
      p.direitos.forEach(function(d) {
        html += '<div class="direito-item">';
        html += '<div class="direito-nome">' + escHtml(d.nome) + '</div>';
        if (d.valor) html += '<div class="direito-valor">R$ ' + escHtml(d.valor) + '</div>';
        if (d.categoria) html += '<div class="direito-tag">' + escHtml(d.categoria) + '</div>';
        html += '<div class="direito-actions">';
        html += '<button onclick="editDireito(' + p.id + ',' + d.id + ')">✏️</button>';
        html += '<button class="danger" onclick="deleteDireito(' + p.id + ',' + d.id + ')">✕</button>';
        html += '</div></div>';
      });
    } else {
      html += '<p style="font-size:0.8rem;color:var(--muted);text-align:center;padding:0.5rem;">Nenhum direito cadastrado para este produto.</p>';
    }
    
    html += '<button class="btn-add-direito" onclick="openDireitoModal(' + p.id + ')">+ Adicionar Direito</button>';
    html += '</div></div>';
    
    card.innerHTML = html;
    container.appendChild(card);
  });
}

function toggleProduto(id) {
  var card = document.getElementById('produto-' + id);
  if (card) card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDERIZAÇÃO: CONSOLIDADO
// ═══════════════════════════════════════════════════════════════════════════
function renderConsolidado() {
  var resumoContainer = document.getElementById('resumo-container');
  var container = document.getElementById('consolidado-container');
  var search = (document.getElementById('search-consolidado').value || '').toLowerCase();
  
  // Coletar todos os direitos com referência ao produto
  var todosDireitos = [];
  produtos.forEach(function(p) {
    (p.direitos || []).forEach(function(d) {
      todosDireitos.push({
        direitoNome: d.nome,
        direitoValor: d.valor,
        direitoCategoria: d.categoria || 'Sem categoria',
        direitoDetalhes: d.detalhes,
        produtoNome: p.nome,
        produtoTipo: p.tipo,
        produtoInstituicao: p.instituicao
      });
    });
  });
  
  // Filtrar
  if (search) {
    todosDireitos = todosDireitos.filter(function(d) {
      return d.direitoNome.toLowerCase().includes(search) ||
             d.direitoCategoria.toLowerCase().includes(search) ||
             d.produtoNome.toLowerCase().includes(search) ||
             (d.produtoTipo || '').toLowerCase().includes(search);
    });
  }
  
  // Resumo
  var totalProdutos = produtos.length;
  var totalDireitos = 0;
  produtos.forEach(function(p) { totalDireitos += (p.direitos || []).length; });
  var categorias = {};
  todosDireitos.forEach(function(d) { categorias[d.direitoCategoria] = true; });
  var totalCategorias = Object.keys(categorias).length;
  var custoTotal = 0;
  produtos.forEach(function(p) { custoTotal += parseCur(p.custo); });
  
  resumoContainer.innerHTML = '<div class="resumo-bar">' +
    '<div class="resumo-stat"><div class="stat-value">' + totalProdutos + '</div><div class="stat-label">Produtos</div></div>' +
    '<div class="resumo-stat"><div class="stat-value">' + totalDireitos + '</div><div class="stat-label">Direitos Mapeados</div></div>' +
    '<div class="resumo-stat"><div class="stat-value">' + totalCategorias + '</div><div class="stat-label">Categorias</div></div>' +
    '<div class="resumo-stat"><div class="stat-value">R$ ' + custoTotal.toLocaleString('pt-BR', {minimumFractionDigits:2}) + '</div><div class="stat-label">Custo Mensal Total</div></div>' +
    '</div>';
  
  // Agrupar por categoria
  var grupos = {};
  todosDireitos.forEach(function(d) {
    var cat = d.direitoCategoria;
    if (!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(d);
  });
  
  if (Object.keys(grupos).length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Nenhum direito cadastrado ainda.<br>Adicione produtos e seus direitos na aba Produtos.</p></div>';
    return;
  }
  
  var html = '<div class="consolidado-grid">';
  Object.keys(grupos).sort().forEach(function(cat) {
    html += '<div class="consolidado-card">';
    html += '<h3>' + escHtml(cat) + ' <span style="font-size:0.7rem;color:var(--muted);font-weight:400;">(' + grupos[cat].length + ')</span></h3>';
    grupos[cat].forEach(function(d) {
      html += '<div class="direito-row">';
      html += '<div><div>' + escHtml(d.direitoNome) + '</div><div class="fonte">' + escHtml(d.produtoNome) + (d.produtoInstituicao ? ' · ' + escHtml(d.produtoInstituicao) : '') + '</div></div>';
      if (d.direitoValor) html += '<div class="valor">R$ ' + escHtml(d.direitoValor) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

//  MODAIS: PRODUTO
// ═══════════════════════════════════════════════════════════════════════════
function openProdutoModal(editId) {
  _editingProdutoId = editId || null;
  document.getElementById('modal-produto-title').textContent = editId ? 'Editar Produto' : 'Novo Produto';
  
  if (editId) {
    var p = produtos.find(function(x) { return x.id === editId; });
    if (p) {
      document.getElementById('mp_nome').value = p.nome || '';
      document.getElementById('mp_tipo').value = p.tipo || '';
      document.getElementById('mp_instituicao').value = p.instituicao || '';
      document.getElementById('mp_custo').value = p.custo || '';
      document.getElementById('mp_vigencia').value = p.vigencia || '';
      document.getElementById('mp_obs').value = p.obs || '';
    }
  } else {
    document.getElementById('mp_nome').value = '';
    document.getElementById('mp_tipo').value = '';
    document.getElementById('mp_instituicao').value = '';
    document.getElementById('mp_custo').value = '';
    document.getElementById('mp_vigencia').value = '';
    document.getElementById('mp_obs').value = '';
  }
  document.getElementById('modal-produto').classList.add('open');
}
function closeProdutoModal() { document.getElementById('modal-produto').classList.remove('open'); _editingProdutoId = null; }
function editProduto(id) { openProdutoModal(id); }

function salvarProduto() {
  var nome = document.getElementById('mp_nome').value.trim();
  if (!nome) { alert('Informe o nome do produto.'); return; }
  
  if (_editingProdutoId) {
    var p = produtos.find(function(x) { return x.id === _editingProdutoId; });
    if (p) {
      p.nome = nome;
      p.tipo = document.getElementById('mp_tipo').value.trim();
      p.instituicao = document.getElementById('mp_instituicao').value.trim();
      p.custo = document.getElementById('mp_custo').value.trim();
      p.vigencia = document.getElementById('mp_vigencia').value;
      p.obs = document.getElementById('mp_obs').value.trim();
    }
  } else {
    produtos.push({
      id: genId(),
      nome: nome,
      tipo: document.getElementById('mp_tipo').value.trim(),
      instituicao: document.getElementById('mp_instituicao').value.trim(),
      custo: document.getElementById('mp_custo').value.trim(),
      vigencia: document.getElementById('mp_vigencia').value,
      obs: document.getElementById('mp_obs').value.trim(),
      direitos: []
    });
  }
  
  closeProdutoModal();
  renderProdutos();
  saveData();
}

function deleteProduto(id) {
  var p = produtos.find(function(x) { return x.id === id; });
  document.getElementById('modal-del-msg').textContent = 'Deseja excluir o produto "' + (p ? p.nome : '') + '" e todos os seus direitos?';
  _delCallback = function() {
    produtos = produtos.filter(function(x) { return x.id !== id; });
    renderProdutos();
    saveData();
  };
  document.getElementById('modal-del').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════════════════
//  MODAIS: DIREITO
// ═══════════════════════════════════════════════════════════════════════════
function openDireitoModal(produtoId, direitoId) {
  _editingDireitoProdutoId = produtoId;
  _editingDireitoId = direitoId || null;
  document.getElementById('modal-direito-title').textContent = direitoId ? 'Editar Direito' : 'Novo Direito';
  
  if (direitoId) {
    var p = produtos.find(function(x) { return x.id === produtoId; });
    var d = p ? (p.direitos || []).find(function(x) { return x.id === direitoId; }) : null;
    if (d) {
      document.getElementById('md_nome').value = d.nome || '';
      document.getElementById('md_valor').value = d.valor || '';
      document.getElementById('md_categoria').value = d.categoria || '';
      document.getElementById('md_detalhes').value = d.detalhes || '';
    }
  } else {
    document.getElementById('md_nome').value = '';
    document.getElementById('md_valor').value = '';
    document.getElementById('md_categoria').value = '';
    document.getElementById('md_detalhes').value = '';
  }
  document.getElementById('modal-direito').classList.add('open');
}
function closeDireitoModal() { document.getElementById('modal-direito').classList.remove('open'); _editingDireitoId = null; _editingDireitoProdutoId = null; }
function editDireito(produtoId, direitoId) { openDireitoModal(produtoId, direitoId); }

function salvarDireito() {
  var nome = document.getElementById('md_nome').value.trim();
  if (!nome) { alert('Informe a descrição do direito.'); return; }
  
  var p = produtos.find(function(x) { return x.id === _editingDireitoProdutoId; });
  if (!p) return;
  if (!p.direitos) p.direitos = [];
  
  if (_editingDireitoId) {
    var d = p.direitos.find(function(x) { return x.id === _editingDireitoId; });
    if (d) {
      d.nome = nome;
      d.valor = document.getElementById('md_valor').value.trim();
      d.categoria = document.getElementById('md_categoria').value.trim();
      d.detalhes = document.getElementById('md_detalhes').value.trim();
    }
  } else {
    p.direitos.push({
      id: genId(),
      nome: nome,
      valor: document.getElementById('md_valor').value.trim(),
      categoria: document.getElementById('md_categoria').value.trim(),
      detalhes: document.getElementById('md_detalhes').value.trim()
    });
  }
  
  closeDireitoModal();
  renderProdutos();
  saveData();
}

function deleteDireito(produtoId, direitoId) {
  var p = produtos.find(function(x) { return x.id === produtoId; });
  var d = p ? (p.direitos || []).find(function(x) { return x.id === direitoId; }) : null;
  document.getElementById('modal-del-msg').textContent = 'Deseja excluir o direito "' + (d ? d.nome : '') + '"?';
  _delCallback = function() {
    if (p) p.direitos = (p.direitos || []).filter(function(x) { return x.id !== direitoId; });
    renderProdutos();
    saveData();
  };
  document.getElementById('modal-del').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════════════════
var _DIR_SUPABASE_URL = 'https://vbikskbfkhundhropykf.supabase.co';
var _DIR_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiaWtza2Jma2h1bmRocm9weWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU1MTk5NjEsImV4cCI6MjA2MTA5NTk2MX0.-n-Tj_5JnF1NL2ZImWlMeTcobWDl_VD6Vqp0lxRQFFU';
var _DIR_LS_KEY = 'hv_direitos_local';
var _DIR_FERRAMENTA = 'direitos';
var _dirSbClient = null;
var _dirSaveTimer = null;

function getClienteId() { return sessionStorage.getItem('cliente_id') || null; }

function _initSupabase() {
  if (window.supabase && window.supabase.createClient) {
    _dirSbClient = window.supabase.createClient(_DIR_SUPABASE_URL, _DIR_SUPABASE_KEY);
  }
}

async function saveData() {
  var clienteId = getClienteId();
  var data = { produtos: produtos };
  
  // LocalStorage
  var lsKey = clienteId ? _DIR_LS_KEY + '_' + clienteId : _DIR_LS_KEY;
  try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch(e) {}
  
  // Supabase (debounce)
  if (_dirSaveTimer) clearTimeout(_dirSaveTimer);
  _dirSaveTimer = setTimeout(function() { _saveToSupabase(clienteId, data); }, 1500);
}

async function _saveToSupabase(clienteId, data) {
  if (!_dirSbClient || !clienteId) return;
  try {
    await _dirSbClient.from('ferramentas_dados').upsert({
      cliente_id: clienteId,
      ferramenta: _DIR_FERRAMENTA,
      dados: data,
      updated_at: new Date().toISOString()
    }, { onConflict: 'cliente_id,ferramenta' });
    _globalSaveFeedback();
  } catch(e) { console.warn('[Direitos] Erro ao salvar no Supabase:', e); }
}

async function loadData() {
  var clienteId = getClienteId();
  _initSupabase();
  
  // Tentar Supabase primeiro
  if (_dirSbClient && clienteId) {
    try {
      var res = await _dirSbClient.from('ferramentas_dados').select('dados').eq('cliente_id', clienteId).eq('ferramenta', _DIR_FERRAMENTA).maybeSingle();
      if (res.data && res.data.dados) {
        var d = res.data.dados;
        produtos = d.produtos || [];
        localStorage.setItem(_DIR_LS_KEY + '_' + clienteId, JSON.stringify(d));
        return;
      }
    } catch(e) { console.warn('[Direitos] Erro ao carregar do Supabase:', e); }
  }
  
  // Fallback: localStorage
  var lsKey = clienteId ? _DIR_LS_KEY + '_' + clienteId : _DIR_LS_KEY;
  var local = localStorage.getItem(lsKey);
  if (local) {
    try {
      var d = JSON.parse(local);
      produtos = d.produtos || [];
    } catch(e) { produtos = []; }
  }
}

function _forceSaveDireitos() {
  if (_dirSaveTimer) clearTimeout(_dirSaveTimer);
  var clienteId = getClienteId();
  var data = { produtos: produtos };
  var lsKey = clienteId ? _DIR_LS_KEY + '_' + clienteId : _DIR_LS_KEY;
  try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch(e) {}
  _saveToSupabase(clienteId, data);
}

function _globalSaveFeedback() {
  var btn = document.getElementById('btnSaveGlobal');
  var icon = document.getElementById('saveIcon');
  var label = document.getElementById('saveLabel');
  if (!btn) return;
  btn.classList.add('saved');
  icon.textContent = '✅';
  label.textContent = 'Salvo!';
  setTimeout(function() {
    btn.classList.remove('saved');
    icon.textContent = '💾';
    label.textContent = 'Salvar Alterações';
  }, 2500);
}

['modal-produto', 'modal-direito', 'modal-del'].forEach(function(id) {
  var el = document.getElementById(id);

    if (e.target === e.currentTarget) el.classList.remove('open');

// ═══════════════════════════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════════════════
(async function init() {
  _initSupabase();
  await loadData();
  renderProdutos();
})();

// ═══════════════════════════════════════════════════════════════════════════
//  HANDLER: IMPORTAR DIAGNÓSTICO
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('importarDiagnostico', function(e) {
  var itens = e.detail.items || [];
  if (itens.length > 0) {
    var importados = 0;
    itens.forEach(function(item) {
      // Tentar mapear itens do diagnóstico como produtos
      var nome = item.nome || item.nome_produto_customizado || item.tipo_produto_nome || item.descricao || '';
      if (!nome) return;
      // Verificar se já existe
      var existe = produtos.find(function(p) { return p.nome.toLowerCase() === nome.toLowerCase(); });
      if (existe) return;
      var custoVal = item.custo_mensal || item.premio_mensal || '';
      if (custoVal && typeof custoVal === 'number') custoVal = custoVal.toLocaleString('pt-BR', {minimumFractionDigits:2});
      produtos.push({
        id: genId(),
        nome: nome,
        tipo: item.tipo || item.tipo_produto_nome || item.categoria || '',
        instituicao: item.instituicao || item.instituicao_nome || item.seguradora || '',
        custo: custoVal,
        vigencia: item.vigencia || item.vencimento || '',
        obs: item.obs || 'Importado do diagnóstico',
        direitos: []
      });
      importados++;
    });
    if (importados > 0) {
      renderProdutos();
      saveData();
      alert(importados + ' produto(s) importado(s) do diagnóstico com sucesso!');
    } else {
      alert('Nenhum produto novo para importar (já existem ou dados insuficientes).');
    }
  }
});
