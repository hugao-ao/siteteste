<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Reais - MithraSF</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/layout.js" defer></script>
    <style>
        /* Specific styles for Juros to match Images 03/04 */
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .mode-btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .mode-btn.active {
            background-color: #eab308; /* Yellow-500 */
            color: black;
            border-color: #eab308;
        }

        .input-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem;
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.9rem; color: #9ca3af; margin-bottom: 0.5rem; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary-color); }

        .action-btn {
            width: 100%;
            background-color: #10b981; /* Green-500 */
            color: white;
            font-weight: bold;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .action-btn:hover { background-color: #059669; }

        .result-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .result-main-label { font-size: 0.9rem; color: #9ca3af; margin-bottom: 0.5rem; }
        .result-main-value { font-size: 3rem; font-weight: bold; color: white; margin-bottom: 2rem; }
        
        .result-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        
        .detail-label { font-size: 0.8rem; color: #9ca3af; }
        .detail-value { font-size: 1.2rem; font-weight: bold; color: #ef4444; } /* Red for costs */

        .recommendation-box {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: left;
        }
        
        .rec-title { color: #10b981; font-weight: bold; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .rec-text { font-size: 0.9rem; color: #d1d5db; line-height: 1.4; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Sidebar Container (Injected by layout.js) -->
    <div id="sidebar-container" class="sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <header class="flex items-center gap-4 mb-8">
                <a href="../ferramentas.html" class="text-gray-400 hover:text-white text-xl">←</a>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-green-500 text-2xl">🧮</span>
                        <h1 class="text-2xl font-bold m-0">Calculadora de Juros Reais</h1>
                    </div>
                    <p class="text-gray-400 text-sm">Auditoria de taxas e simulação de custo efetivo total.</p>
                </div>
                <button id="mobile-toggle" class="mobile-toggle ml-auto md:hidden">☰</button>
            </header>

            <!-- Mode Switcher -->
            <div class="mode-switch">
                <button id="btn-mode-rate" class="mode-btn active" onclick="setMode('rate')">Auditar Taxa de Juros</button>
                <button id="btn-mode-installment" class="mode-btn" onclick="setMode('installment')">Simular Parcela</button>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <!-- Input Section -->
                <div class="input-card">
                    <h3 class="text-green-500 font-bold mb-6" id="input-title">Dados da Operação</h3>
                    
                    <div class="input-group">
                        <label>Valor à Vista (R$)</label>
                        <input type="text" id="cashPrice" placeholder="R$ 0,00" oninput="formatCurrency(this)">
                    </div>

                    <div class="input-group">
                        <label>Número de Parcelas</label>
                        <input type="number" id="installments" placeholder="12">
                    </div>

                    <!-- Dynamic Input: Either Installment Value OR Interest Rate -->
                    <div class="input-group" id="group-installment-value">
                        <label>Valor da Parcela (R$)</label>
                        <input type="text" id="installmentValue" placeholder="R$ 0,00" oninput="formatCurrency(this)">
                    </div>

                    <div class="input-group hidden" id="group-interest-rate">
                        <label>Taxa de Juros (%)</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="number" id="interestRate" placeholder="Ex: 2" step="0.01" style="flex: 2;">
                            <select id="rateType" style="flex: 1;">
                                <option value="monthly">Mensal</option>
                                <option value="annual">Anual</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="calculate()" class="action-btn" id="action-btn">Calcular Custo Efetivo</button>
                </div>

                <!-- Result Section -->
                <div class="result-card" id="result-card" style="opacity: 0.5;">
                    <p class="result-main-label" id="result-main-label">Custo Efetivo Mensal (CET)</p>
                    <p class="result-main-value" id="result-main-value">0.00% a.m.</p>

                    <div class="result-details-grid">
                        <div>
                            <p class="detail-label">Montante Total</p>
                            <p class="detail-value" id="total-paid">R$ 0,00</p>
                        </div>
                        <div>
                            <p class="detail-label">Custo de Juros</p>
                            <p class="detail-value" id="total-interest">R$ 0,00</p>
                        </div>
                    </div>

                    <div class="recommendation-box hidden" id="rec-box">
                        <div class="rec-title">
                            <span>✅</span> <span id="rec-title">Análise de Viabilidade</span>
                        </div>
                        <p class="rec-text" id="rec-text">
                            <!-- Text injected by JS -->
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'rate'; // 'rate' or 'installment'

        function setMode(mode) {
            currentMode = mode;
            
            // Update Buttons
            document.getElementById('btn-mode-rate').className = mode === 'rate' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('btn-mode-installment').className = mode === 'installment' ? 'mode-btn active' : 'mode-btn';

            // Update Inputs
            const groupInstallment = document.getElementById('group-installment-value');
            const groupRate = document.getElementById('group-interest-rate');
            const actionBtn = document.getElementById('action-btn');
            const inputTitle = document.getElementById('input-title');
            const resultMainLabel = document.getElementById('result-main-label');

            if (mode === 'rate') {
                groupInstallment.classList.remove('hidden');
                groupRate.classList.add('hidden');
                actionBtn.textContent = 'Calcular Custo Efetivo';
                inputTitle.textContent = 'Dados da Operação';
                resultMainLabel.textContent = 'Custo Efetivo Mensal (CET)';
            } else {
                groupInstallment.classList.add('hidden');
                groupRate.classList.remove('hidden');
                actionBtn.textContent = 'Simular Fluxo de Pagamento';
                inputTitle.textContent = 'Parâmetros do Financiamento';
                resultMainLabel.textContent = 'Parcela Mensal Projetada';
            }

            // Reset Results
            document.getElementById('result-card').style.opacity = '0.5';
            document.getElementById('rec-box').classList.add('hidden');
            document.getElementById('result-main-value').textContent = mode === 'rate' ? '0.00% a.m.' : 'R$ 0,00';
            document.getElementById('total-paid').textContent = 'R$ 0,00';
            document.getElementById('total-interest').textContent = 'R$ 0,00';
        }

        function formatCurrency(input) {
            let value = input.value.replace(/\D/g, '');
            value = (parseFloat(value) / 100).toFixed(2) + '';
            value = value.replace('.', ',');
            value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
            if (value === 'NaN') value = '';
            input.value = value;
        }

        function parseCurrency(value) {
            if (!value) return 0;
            return parseFloat(value.replace(/\./g, '').replace(',', '.'));
        }

        function formatBRL(value) {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calculate() {
            const cashPrice = parseCurrency(document.getElementById('cashPrice').value);
            const n = parseInt(document.getElementById('installments').value);

            if (!cashPrice || !n) {
                alert("Preencha o valor à vista e o número de parcelas.");
                return;
            }

            document.getElementById('result-card').style.opacity = '1';

            if (currentMode === 'rate') {
                // Mode 1: Find Interest Rate
                const pmt = parseCurrency(document.getElementById('installmentValue').value);
                if (!pmt) { alert("Preencha o valor da parcela."); return; }

                // Newton-Raphson method to find rate
                // f(r) = pmt * (1 - (1+r)^-n) / r - cashPrice = 0
                
                let rate = 0.01; // Initial guess
                let totalPaid = pmt * n;
                let totalInterest = totalPaid - cashPrice;

                // Simple check if interest is 0 or negative
                if (totalPaid <= cashPrice) {
                    rate = 0;
                } else {
                    for(let i=0; i<100; i++) {
                        let f = pmt * (1 - Math.pow(1 + rate, -n)) / rate - cashPrice;
                        let df = pmt * (Math.pow(1 + rate, -n-1) * n * rate - (1 - Math.pow(1 + rate, -n))) / (rate * rate);
                        let newRate = rate - f / df;
                        if (Math.abs(newRate - rate) < 0.000001) { rate = newRate; break; }
                        rate = newRate;
                    }
                }

                document.getElementById('result-main-value').textContent = (rate * 100).toFixed(2) + '% a.m.';
                document.getElementById('total-paid').textContent = formatBRL(totalPaid);
                document.getElementById('total-interest').textContent = formatBRL(totalInterest);

                // Recommendation Logic
                const recBox = document.getElementById('rec-box');
                const recTitle = document.getElementById('rec-title');
                const recText = document.getElementById('rec-text');
                
                recBox.classList.remove('hidden');
                if (rate > 0.01) { // If rate > 1% per month
                    recTitle.textContent = "Custo Elevado de Capital";
                    recTitle.parentElement.querySelector('span').textContent = "⚠️";
                    recBox.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                    recBox.style.borderColor = "rgba(239, 68, 68, 0.3)";
                    recBox.querySelector('.rec-title').style.color = "#ef4444";
                    recText.innerHTML = `<strong>Diagnóstico:</strong> O Custo Efetivo Total (CET) desta operação é de <strong>${(rate*100).toFixed(2)}% ao mês</strong>. <br>Isso supera a rentabilidade média de investimentos conservadores (aprox. 0,8% a.m.). Financeiramente, a compra à vista é mandatória para evitar destruição de valor.`;
                } else {
                    recTitle.textContent = "Custo de Oportunidade Favorável";
                    recTitle.parentElement.querySelector('span').textContent = "✅";
                    recBox.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                    recBox.style.borderColor = "rgba(16, 185, 129, 0.3)";
                    recBox.querySelector('.rec-title').style.color = "#10b981";
                    recText.innerHTML = `<strong>Diagnóstico:</strong> A taxa implícita de <strong>${(rate*100).toFixed(2)}% ao mês</strong> está competitiva. <br>Se o seu capital estiver investido a uma taxa superior a esta, o parcelamento é matematicamente vantajoso (alavancagem positiva).`;
                }

            } else {
                // Mode 2: Calculate Installment
                let rateInput = parseFloat(document.getElementById('interestRate').value);
                const rateType = document.getElementById('rateType').value;

                if (isNaN(rateInput)) { alert("Preencha a taxa de juros."); return; }

                let monthlyRate;
                if (rateType === 'annual') {
                    // Convert Annual to Monthly: (1 + annual)^(1/12) - 1
                    monthlyRate = Math.pow(1 + (rateInput / 100), 1/12) - 1;
                } else {
                    monthlyRate = rateInput / 100;
                }

                // PMT Formula: PV * i / (1 - (1+i)^-n)
                let pmt;
                if (monthlyRate === 0) {
                    pmt = cashPrice / n;
                } else {
                    pmt = cashPrice * monthlyRate / (1 - Math.pow(1 + monthlyRate, -n));
                }

                let totalPaid = pmt * n;
                let totalInterest = totalPaid - cashPrice;

                document.getElementById('result-main-value').textContent = formatBRL(pmt);
                document.getElementById('total-paid').textContent = formatBRL(totalPaid);
                document.getElementById('total-interest').textContent = formatBRL(totalInterest);
                
                // Financial Impact Assessment Logic
                const recBox = document.getElementById('rec-box');
                const recTitle = document.getElementById('rec-title');
                const recText = document.getElementById('rec-text');
                
                recBox.classList.remove('hidden');
                
                const overpricePercent = (totalInterest / cashPrice) * 100;
                
                if (overpricePercent < 10) {
                    recTitle.textContent = "Baixo Impacto Financeiro";
                    recTitle.parentElement.querySelector('span').textContent = "✅";
                    recBox.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                    recBox.style.borderColor = "rgba(16, 185, 129, 0.3)";
                    recBox.querySelector('.rec-title').style.color = "#10b981";
                    recText.innerHTML = `<strong>Diagnóstico:</strong> Você pagará apenas <strong>${overpricePercent.toFixed(2)}%</strong> a mais pelo bem. <br>O custo do crédito está controlado e eficiente.`;
                } else if (overpricePercent < 30) {
                    recTitle.textContent = "Médio Impacto Financeiro";
                    recTitle.parentElement.querySelector('span').textContent = "⚠️";
                    recBox.style.backgroundColor = "rgba(234, 179, 8, 0.1)";
                    recBox.style.borderColor = "rgba(234, 179, 8, 0.3)";
                    recBox.querySelector('.rec-title').style.color = "#eab308";
                    recText.innerHTML = `<strong>Atenção:</strong> Você pagará <strong>${overpricePercent.toFixed(2)}%</strong> a mais pelo bem. <br>O custo dos juros já representa uma fatia considerável do valor original. Avalie se a compra é urgente.`;
                } else {
                    recTitle.textContent = "Alto Impacto Financeiro";
                    recTitle.parentElement.querySelector('span').textContent = "🚨";
                    recBox.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                    recBox.style.borderColor = "rgba(239, 68, 68, 0.3)";
                    recBox.querySelector('.rec-title').style.color = "#ef4444";
                    recText.innerHTML = `<strong>Alerta de Custo Elevado:</strong> Você pagará <strong>${overpricePercent.toFixed(2)}%</strong> a mais pelo bem. <br>Isso significa que quase 1/3 ou mais do valor pago será apenas juros. Considere juntar o dinheiro para comprar à vista.`;
                }
            }
        }
    </script>
</body>
</html>
