<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Compostos - MithraSF</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/layout.js" defer></script>
</head>
<body>
    <div id="sidebar-container" class="sidebar"></div>

    <main class="main-content">
        <div class="container">
            <header class="flex justify-between items-center mb-8">
                <h1>Calculadora de Juros Compostos</h1>
                <button id="mobile-toggle" class="mobile-toggle">☰</button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Input Form -->
                <div class="card space-y-6">
                    <div class="form-group">
                        <label>Investimento Inicial (R$)</label>
                        <input type="number" id="initial" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Aporte Mensal (R$)</label>
                        <input type="number" id="monthly" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Taxa de Juros Anual (%)</label>
                        <input type="number" id="rate" placeholder="Ex: 10.5" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Período (Anos)</label>
                        <input type="number" id="years" placeholder="Ex: 10">
                    </div>
                    <button onclick="calculateInterest()" class="btn btn-primary w-full">Calcular Resultado</button>
                </div>

                <!-- Result Display -->
                <div class="card flex flex-col justify-center items-center text-center bg-emerald-900/30 border-primary/20">
                    <h3 class="text-xl text-gray-300 mb-4">Valor Total Acumulado</h3>
                    <p id="total-result" class="text-5xl md:text-6xl font-bold text-primary mb-2">R$ 0,00</p>
                    <div id="breakdown" class="mt-6 w-full text-left hidden">
                        <div class="flex justify-between border-b border-white/10 py-2">
                            <span class="text-gray-400">Total Investido:</span>
                            <span id="total-invested" class="font-bold text-white">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between border-b border-white/10 py-2">
                            <span class="text-gray-400">Total em Juros:</span>
                            <span id="total-interest" class="font-bold text-green-400">R$ 0,00</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 mt-4">
                        *Simulação baseada em taxa constante. Resultados podem variar.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateInterest() {
            const p = parseFloat(document.getElementById('initial').value) || 0;
            const m = parseFloat(document.getElementById('monthly').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
            const t = (parseFloat(document.getElementById('years').value) || 0) * 12;

            if (t <= 0) return;

            let total = p * Math.pow(1 + r, t);
            for (let i = 1; i <= t; i++) {
                total += m * Math.pow(1 + r, t - i);
            }

            const totalInvested = p + (m * t);
            const totalInterest = total - totalInvested;

            // Format Currency
            const formatBRL = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            document.getElementById('total-result').textContent = formatBRL(total);
            document.getElementById('total-invested').textContent = formatBRL(totalInvested);
            document.getElementById('total-interest').textContent = formatBRL(totalInterest);
            
            document.getElementById('breakdown').classList.remove('hidden');
        }
    </script>
</body>
</html>
