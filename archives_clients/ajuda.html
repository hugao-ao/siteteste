<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preciso de Algo - MithraSF</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/layout.js" defer></script>
</head>
<body>
    <div id="sidebar-container" class="sidebar"></div>

    <main class="main-content">
        <div class="container">
            <header class="flex justify-between items-center mb-8">
                <h1>Preciso de Algo</h1>
                <button id="mobile-toggle" class="mobile-toggle">☰</button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card">
                    <h2 class="text-xl font-bold text-white mb-4">Fale Conosco</h2>
                    <p class="text-gray-300 mb-6">
                        Tem alguma dúvida ou precisa de suporte? Entre em contato diretamente com nossa equipe.
                    </p>
                    <a href="mailto:contato@mithrasf.com.br" class="btn btn-primary w-full text-center">
                        Enviar E-mail
                    </a>
                </div>

                <div class="card">
                    <h2 class="text-xl font-bold text-white mb-4">Agendar Reunião</h2>
                    <p class="text-gray-300 mb-6">
                        Precisa de uma consultoria personalizada? Agende um horário com nossos especialistas.
                    </p>
                    <button class="btn btn-outline w-full" disabled>
                        Agendamento (Em Breve)
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
