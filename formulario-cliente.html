<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário do Cliente</title>
  <link rel="stylesheet" href="style.css"> <!-- Link para o CSS principal -->
  <!-- SISTEMA DE SEGURANÇA - Importar middleware de autenticação -->
  <script src="auth-middleware.js"></script>
  <style>
    /* --- MITHRA THEME (Emerald & Gold) --- */
    :root {
      /* Cores Base */
      --mithra-bg: #002b24; /* Verde Esmeralda Escuro */
      --mithra-surface: #003831; /* Esmeralda um pouco mais claro */
      --mithra-surface-hover: #00453d;
      
      /* Cores de Texto */
      --mithra-text-primary: #f2e8c9; /* Dourado Claro / Creme */
      --mithra-text-secondary: #b0c4de; /* Azul acinzentado suave para contraste */
      --mithra-text-muted: #6b8e88; /* Verde acinzentado */
      
      /* Cores de Ação/Destaque */
      --mithra-gold: #d4af37; /* Dourado Rico */
      --mithra-gold-hover: #eac14d;
      --mithra-gold-dark: #aa8c2c;
      
      /* Bordas e Linhas */
      --mithra-border: rgba(212, 175, 55, 0.2); /* Dourado com transparência */
      --mithra-border-focus: rgba(212, 175, 55, 0.6);
      
      /* Feedback */
      --mithra-success: #2e7d32;
      --mithra-error: #c62828;
      
      /* Sombras */
      --mithra-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--mithra-bg);
      color: var(--mithra-text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
    }

    /* Container Principal Responsivo */
    .form-container {
      background-color: var(--mithra-surface);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: var(--mithra-shadow);
      border: 1px solid var(--mithra-border);
      width: 90%;
      max-width: 600px; /* Largura máxima confortável para leitura */
      margin: 2rem auto;
      box-sizing: border-box;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Títulos */
    .form-container h1 {
      color: var(--mithra-gold);
      margin-bottom: 2rem;
      font-size: 1.8rem;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--mithra-border);
      padding-bottom: 1rem;
    }

    .form-container h2, .form-container h3 {
      color: var(--mithra-text-primary);
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    /* Labels */
    .form-container label {
      display: block;
      text-align: left;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--mithra-text-secondary);
      font-size: 0.95rem;
    }

    /* Inputs e Selects */
    .form-container input[type="text"],
    .form-container input[type="number"],
    .form-container input[type="email"],
    .form-container input[type="date"],
    .form-container select,
    .form-container textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--mithra-border);
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.2); /* Fundo escuro translúcido */
      color: var(--mithra-text-primary);
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-container input:focus,
    .form-container select:focus,
    .form-container textarea:focus {
      outline: none;
      border-color: var(--mithra-gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      background-color: rgba(0, 0, 0, 0.3);
    }

    /* Radio Buttons e Checkboxes - Estilo Separado (Imagem 03) */
    /* Aplica-se a .radio-group e também aos containers dinâmicos como .radio-options-inline */
    .radio-group, 
    .radio-options-inline,
    .radio-options-inline-patrimonio {
        text-align: left;
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 1.5rem; /* Espaço maior entre as opções */
        margin-top: 0.8rem;
        align-items: center; /* Alinha verticalmente */
        padding-left: 10px; /* Um pouco de respiro */
        position: relative; /* CRUCIAL: Mantém os inputs absolutos dentro deste container */
    }
    
    /* A pergunta (label que não é opção) deve ocupar 100% da largura */
    .radio-group > label:first-child:not([for]),
    .form-group > label:first-child {
        width: 100%;
        margin-bottom: 0.5rem;
        margin-left: 0;
        padding: 0;
        background: none;
        border: none;
        font-weight: 500;
        color: var(--mithra-text-secondary);
        font-size: 0.95rem;
        display: block;
        flex: 0 0 100%; /* Força quebra de linha */
    }

    /* Estilo para os labels das opções (Sim/Não) */
    .radio-group label[for],
    .radio-options-inline label[for],
    .radio-options-inline-patrimonio label[for] {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        margin-left: 0; /* REMOVIDO: Não precisa mais reservar espaço pois a bolinha não é absoluta */
        position: relative;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--mithra-border);
        border-radius: 8px;
        width: auto;
        flex: 1;
        min-width: 100px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--mithra-text-primary);
    }

    /* O input radio (a bolinha) */
    .radio-group input[type="radio"],
    .radio-group input[type="checkbox"],
    .radio-options-inline input[type="radio"],
    .radio-options-inline-patrimonio input[type="radio"] {
        /* position: absolute;  <-- REMOVIDO: Causa problemas de scroll se o pai não for relativo */
        /* Em vez de absoluto global, vamos usar flexbox ou posicionamento local */
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        margin-right: 10px; /* Espaço entre bolinha e texto */
        position: relative; /* Volta ao fluxo normal */
        top: 0;
        left: 0;
        transform: none;
        margin: 0;
        width: 24px;
        height: 24px;
        border: 2px solid var(--mithra-text-secondary);
        border-radius: 50%;
        appearance: none;
        -webkit-appearance: none;
        background-color: transparent;
        cursor: pointer;
        z-index: 1;
    }

    /* Estado checado da bolinha */
    .radio-group input[type="radio"]:checked,
    .radio-group input[type="checkbox"]:checked,
    .radio-options-inline input[type="radio"]:checked,
    .radio-options-inline-patrimonio input[type="radio"]:checked {
        border-color: var(--mithra-gold);
        background-color: var(--mithra-gold);
        box-shadow: inset 0 0 0 4px var(--mithra-bg); /* Cria o efeito de "olho" */
    }

    /* Hover na caixa de texto */
    .radio-group label[for]:hover,
    .radio-options-inline label[for]:hover,
    .radio-options-inline-patrimonio label[for]:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--mithra-gold);
    }

    /* Estado selecionado da caixa de texto */
    /* Nota: Como o input está fora do label no HTML (input + label), precisamos usar o seletor de irmão adjacente */
    .radio-group input[type="radio"]:checked + label,
    .radio-group input[type="checkbox"]:checked + label,
    .radio-options-inline input[type="radio"]:checked + label,
    .radio-options-inline-patrimonio input[type="radio"]:checked + label {
        background: rgba(212, 175, 55, 0.15);
        border-color: var(--mithra-gold);
    }
    
    /* Ajuste específico para quando o input está DENTRO do label (alguns casos legados ou JS dinâmico) */
    .radio-group label:has(input:checked),
    .radio-options-inline label:has(input:checked),
    .radio-options-inline-patrimonio label:has(input:checked) {
        background: rgba(212, 175, 55, 0.15);
        border-color: var(--mithra-gold);
    }

    /* Botões Principais */
    .form-container button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--mithra-gold-dark), var(--mithra-gold));
      color: #002b24; /* Texto escuro para contraste no dourado */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .form-container button:hover {
      background: linear-gradient(135deg, var(--mithra-gold), var(--mithra-gold-hover));
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(212, 175, 55, 0.3);
    }

    .form-container button:active {
      transform: translateY(0);
    }

    /* Mensagens de Feedback */
    .message {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }
    .message.success {
      background-color: rgba(46, 125, 50, 0.2);
      color: #a5d6a7;
      border: 1px solid var(--mithra-success);
    }
    .message.error {
      background-color: rgba(198, 40, 40, 0.2);
      color: #ef9a9a;
      border: 1px solid var(--mithra-error);
    }

    /* Itens Dinâmicos (Cards dentro do form) */
    .dynamic-entry-item {
        background-color: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--mithra-border);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        text-align: left;
        position: relative; /* Para posicionar botão de remover */
    }

    .dynamic-entry-item h4 {
        color: var(--mithra-gold);
        margin-top: 0;
        border-bottom: 1px solid var(--mithra-border);
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
    }

    /* Botões Secundários (Adicionar/Remover) */
    .add-dynamic-entry-btn, #add-patrimonio-btn {
        background: transparent;
        color: var(--mithra-gold);
        border: 1px dashed var(--mithra-gold);
        padding: 0.8rem;
        font-size: 0.95rem;
        margin-top: 0.5rem;
        margin-bottom: 1.5rem;
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
        font-weight: 600;
        transition: all 0.3s ease;
        text-transform: none; /* Diferente do botão principal */
    }

    .add-dynamic-entry-btn:hover, #add-patrimonio-btn:hover {
         background: rgba(212, 175, 55, 0.1);
         box-shadow: none;
         transform: none;
    }

    .remove-dynamic-entry-btn {
        background: transparent;
        color: var(--mithra-error); /* Vermelho */
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        border: 1px solid var(--mithra-error);
        border-radius: 6px;
        cursor: pointer;
        margin-top: 0.5rem;
        display: inline-block;
        width: auto; /* Não ocupa 100% */
        float: right;
    }

    .remove-dynamic-entry-btn:hover {
        background: rgba(198, 40, 40, 0.1);
        color: #ffcdd2;
    }

    /* Responsividade Mobile */
    @media (max-width: 600px) {
      .form-container {
        padding: 1.5rem;
        width: 95%;
        margin: 1rem auto;
      }

      .form-container h1 {
        font-size: 1.5rem;
      }

      .radio-group {
        flex-direction: column;
        gap: 0.5rem;
    }
      
      .radio-group label {
        width: 100%;
        box-sizing: border-box;
      }
    }

  </style>
</head>
<body class="theme-planejamento"> 
  <div class="form-container">
    <h1 id="form-title">Formulário do Cliente</h1>
    <div id="form-content">
      <p>Carregando...</p>
    </div>
    <div id="message-area"></div>
  </div>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="formulario-cliente.js"></script>
</body>
</html>
