<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário do Cliente</title>
  <link rel="stylesheet" href="style.css"> <!-- Link para o CSS principal -->
  <!-- SISTEMA DE SEGURANÇA - Importar middleware de autenticação -->
  <script src="auth-middleware.js"></script>
  <style>
    /* --- MITHRA THEME (Emerald & Gold) --- */
    :root {
      /* Cores Base */
      --mithra-bg: #002b24; /* Verde Esmeralda Escuro */
      --mithra-surface: #003831; /* Esmeralda um pouco mais claro */
      --mithra-surface-hover: #00453d;
      
      /* Cores de Texto */
      --mithra-text-primary: #f2e8c9; /* Dourado Claro / Creme */
      --mithra-text-secondary: #b0c4de; /* Azul acinzentado suave para contraste */
      --mithra-text-muted: #6b8e88; /* Verde acinzentado */
      
      /* Cores de Ação/Destaque */
      --mithra-gold: #d4af37; /* Dourado Rico */
      --mithra-gold-hover: #eac14d;
      --mithra-gold-dark: #aa8c2c;
      
      /* Bordas e Linhas */
      --mithra-border: rgba(212, 175, 55, 0.2); /* Dourado com transparência */
      --mithra-border-focus: rgba(212, 175, 55, 0.6);
      
      /* Feedback */
      --mithra-success: #2e7d32;
      --mithra-error: #c62828;
      
      /* Sombras */
      --mithra-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--mithra-bg);
      color: var(--mithra-text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
    }

    /* Container Principal Responsivo */
    .form-container {
      background-color: var(--mithra-surface);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: var(--mithra-shadow);
      border: 1px solid var(--mithra-border);
      width: 90%;
      max-width: 600px; /* Largura máxima confortável para leitura */
      margin: 2rem auto;
      box-sizing: border-box;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Títulos */
    .form-container h1 {
      color: var(--mithra-gold);
      margin-bottom: 2rem;
      font-size: 1.8rem;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--mithra-border);
      padding-bottom: 1rem;
    }

    .form-container h2, .form-container h3 {
      color: var(--mithra-text-primary);
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    /* Labels */
    .form-container label {
      display: block;
      text-align: left;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--mithra-text-secondary);
      font-size: 0.95rem;
    }

    /* Inputs e Selects */
    .form-container input[type="text"],
    .form-container input[type="number"],
    .form-container input[type="email"],
    .form-container input[type="date"],
    .form-container select,
    .form-container textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--mithra-border);
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.2); /* Fundo escuro translúcido */
      color: var(--mithra-text-primary);
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-container input:focus,
    .form-container select:focus,
    .form-container textarea:focus {
      outline: none;
      border-color: var(--mithra-gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      background-color: rgba(0, 0, 0, 0.3);
    }

    /* Radio Buttons e Checkboxes - Estilo Separado (Imagem 03) */
    .radio-group {
        text-align: left;
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 1.5rem; /* Espaço maior entre as opções */
        margin-top: 0.8rem;
        align-items: center; /* Alinha verticalmente */
    }
    
    .radio-group label {
        display: flex;
        align-items: center;
        margin-right: 0;
        font-weight: normal;
        color: var(--mithra-text-primary);
        cursor: pointer;
        background: transparent; /* Remove fundo do label container */
        padding: 0;
        border: none; /* Remove borda do label container */
        flex: 1;
        min-width: 140px;
        position: relative; /* Para posicionamento */
    }

    /* O input radio (a bolinha) */
    .radio-group input[type="radio"],
    .radio-group input[type="checkbox"] {
        appearance: none; /* Remove estilo padrão */
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid var(--mithra-text-secondary);
        border-radius: 50%;
        margin-right: 15px; /* Espaço entre a bolinha e a caixa de texto */
        outline: none;
        cursor: pointer;
        position: relative;
        flex-shrink: 0; /* Não encolher */
        background-color: transparent;
    }

    /* Estado checado da bolinha */
    .radio-group input[type="radio"]:checked,
    .radio-group input[type="checkbox"]:checked {
        border-color: var(--mithra-gold);
        background-color: var(--mithra-gold);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); /* Halo ao redor */
    }

    /* A caixa de texto (Sim/Não) */
    .radio-group label span, 
    .radio-group label:not(:has(span)) { /* Fallback se não tiver span, mas idealmente deveria ter */
        /* Como o texto está solto no HTML original, precisamos estilizar o texto em si ou criar um pseudo-elemento visual se não pudermos alterar o HTML.
           Mas como podemos alterar o CSS, vamos usar um truque: estilizar o label mas tirar o estilo da parte do input.
           Melhor: Vamos estilizar o label como a caixa, mas fazer o input "sair" visualmente dela? Não, o input está dentro.
           
           Solução para HTML existente (input + texto dentro do label):
           Vamos usar flexbox no label. O input é o primeiro filho. O texto é um nó de texto.
           Não dá para estilizar nó de texto diretamente.
           
           Vou assumir que o texto está solto. Vou criar um visual de caixa para o label, mas deslocar o input para fora?
           Não, o input está dentro do label.
           
           Vou fazer o seguinte: O label será transparente. O input será a bolinha.
           E vou criar um ::after no label que será a caixa de texto? Não, o texto ficaria em cima.
           
           Vou usar uma abordagem diferente:
           O label continua sendo o container.
           O input fica à esquerda.
           O texto precisa de um container para ter borda.
           Como não posso mudar o HTML de todos os labels facilmente via CSS (o texto está solto),
           vou usar uma técnica de background no label, mas com padding-left grande para "expulsar" o input da área do background?
           Não, o input está dentro.
           
           Vou tentar simular a caixa de texto usando box-shadow ou background com clip?
           
           Vamos tentar isso:
           O label é o container flex.
           O input tem margem direita.
           O texto... infelizmente sem um <span> em volta do texto, é difícil dar borda SÓ para o texto.
           
           Mas espere, na imagem 03, a bolinha está FORA da caixa.
           Se o HTML é <label><input> Texto</label>, o input e o texto são irmãos (ou pai/filho).
           
           Se eu não puder mudar o HTML para <label><input> <span>Texto</span></label>,
           terei que estilizar o label inteiro como a caixa, e fazer o input parecer que está fora?
           Posso usar `position: absolute` no input e mover ele para a esquerda, fora do label.
           E dar margem esquerda ao label para compensar.
        */
        display: block;
        width: 100%;
        padding: 0.8rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--mithra-border);
        border-radius: 8px;
        text-align: center;
        transition: all 0.2s;
    }
    
    /* Ajuste para a estrutura HTML atual: <label><input> Texto</label> */
    .radio-group label {
        position: relative;
        padding-left: 40px; /* Espaço para a bolinha */
        background: transparent;
        border: none;
        overflow: visible; /* Permitir que a bolinha saia se necessário, mas aqui ela vai ficar no padding */
    }

    /* A bolinha (input) posicionada absolutamente à esquerda */
    .radio-group input[type="radio"],
    .radio-group input[type="checkbox"] {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        margin: 0;
        width: 24px;
        height: 24px;
        border: 2px solid var(--mithra-text-secondary);
        border-radius: 50%;
        appearance: none;
        -webkit-appearance: none;
        background-color: transparent;
        cursor: pointer;
        z-index: 1;
    }

    /* Estado checado da bolinha */
    .radio-group input[type="radio"]:checked,
    .radio-group input[type="checkbox"]:checked {
        border-color: var(--mithra-gold);
        background-color: var(--mithra-gold);
        box-shadow: inset 0 0 0 4px var(--mithra-bg); /* Cria o efeito de "olho" */
    }

    /* A "caixa" visual que contém o texto. 
       Como não temos um span, vamos usar o próprio label, mas precisamos tirar o input da jogada visualmente (já tiramos com absolute).
       Mas o texto está solto no label. Se dermos background no label, vai cobrir a área do input se não cuidarmos.
       
       Vamos usar um pseudo-elemento ::after para criar a caixa atrás do texto?
       Não, o texto ficaria na frente.
       
       Vamos estilizar o label como a caixa, mas com margin-left para afastar da bolinha.
    */
    .radio-group label {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        margin-left: 35px; /* Espaço reservado para a bolinha que está absolute à esquerda DESTE elemento? Não, se movermos o label, o input move junto. */
        
        /* Resetando a estratégia anterior */
        position: relative;
        padding-left: 0;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--mithra-border);
        border-radius: 8px;
        width: auto;
        flex: 1;
    }

    /* Agora, tirar o input de dentro da caixa visualmente */
    .radio-group input[type="radio"],
    .radio-group input[type="checkbox"] {
        position: absolute;
        left: -40px; /* Move a bolinha para fora da caixa, à esquerda */
        top: 50%;
        transform: translateY(-50%);
        margin: 0;
    }

    /* Container do label precisa ter margem esquerda para não cortar a bolinha que está fora */
    .radio-group {
        padding-left: 10px; /* Um pouco de respiro */
    }
    
    .radio-group label {
        margin-left: 30px; /* Espaço para a bolinha não sobrepor o label anterior ou a margem */
    }

    /* Hover na caixa de texto */
    .radio-group label:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--mithra-gold);
    }

    /* Estado selecionado da caixa de texto */
    .radio-group label:has(input:checked) {
        background: rgba(212, 175, 55, 0.15);
        border-color: var(--mithra-gold);
    }

    /* Botões Principais */
    .form-container button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--mithra-gold-dark), var(--mithra-gold));
      color: #002b24; /* Texto escuro para contraste no dourado */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .form-container button:hover {
      background: linear-gradient(135deg, var(--mithra-gold), var(--mithra-gold-hover));
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(212, 175, 55, 0.3);
    }

    .form-container button:active {
      transform: translateY(0);
    }

    /* Mensagens de Feedback */
    .message {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }
    .message.success {
      background-color: rgba(46, 125, 50, 0.2);
      color: #a5d6a7;
      border: 1px solid var(--mithra-success);
    }
    .message.error {
      background-color: rgba(198, 40, 40, 0.2);
      color: #ef9a9a;
      border: 1px solid var(--mithra-error);
    }

    /* Itens Dinâmicos (Cards dentro do form) */
    .dynamic-entry-item {
        background-color: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--mithra-border);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        text-align: left;
        position: relative; /* Para posicionar botão de remover */
    }

    .dynamic-entry-item h4 {
        color: var(--mithra-gold);
        margin-top: 0;
        border-bottom: 1px solid var(--mithra-border);
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
    }

    /* Botões Secundários (Adicionar/Remover) */
    .add-dynamic-entry-btn, #add-patrimonio-btn {
        background: transparent;
        color: var(--mithra-gold);
        border: 1px dashed var(--mithra-gold);
        padding: 0.8rem;
        font-size: 0.95rem;
        margin-top: 0.5rem;
        margin-bottom: 1.5rem;
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
        text-align: center;
        font-weight: 600;
        transition: all 0.3s ease;
        text-transform: none; /* Diferente do botão principal */
    }

    .add-dynamic-entry-btn:hover, #add-patrimonio-btn:hover {
         background: rgba(212, 175, 55, 0.1);
         box-shadow: none;
         transform: none;
    }

    .remove-dynamic-entry-btn {
        background: transparent;
        color: var(--mithra-error); /* Vermelho */
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        border: 1px solid var(--mithra-error);
        border-radius: 6px;
        cursor: pointer;
        margin-top: 0.5rem;
        display: inline-block;
        width: auto; /* Não ocupa 100% */
        float: right;
    }

    .remove-dynamic-entry-btn:hover {
        background: rgba(198, 40, 40, 0.1);
        color: #ffcdd2;
    }

    /* Responsividade Mobile */
    @media (max-width: 600px) {
      .form-container {
        padding: 1.5rem;
        width: 95%;
        margin: 1rem auto;
      }

      .form-container h1 {
        font-size: 1.5rem;
      }

      .radio-group {
        flex-direction: column;
        gap: 0.5rem;
    }
      
      .radio-group label {
        width: 100%;
        box-sizing: border-box;
      }
    }

  </style>
</head>
<body class="theme-planejamento"> 
  <div class="form-container">
    <h1 id="form-title">Formulário do Cliente</h1>
    <div id="form-content">
      <p>Carregando...</p>
    </div>
    <div id="message-area"></div>
  </div>

  <script type="module" src="supabase.js"></script>
  <script type="module" src="formulario-cliente.js"></script>
</body>
</html>
