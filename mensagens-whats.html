<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="page-guard.js"></script>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensagens WhatsApp - Clientes</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* --- Sidebar Integration Styles --- */
    body {
      display: flex;
      margin: 0;
      min-height: 100vh;
    }
    #main-content-mensagens {
      flex-grow: 1;
      padding: 2rem;
      margin-left: 250px;
      transition: margin-left 0.3s ease;
      background-color: var(--bg-surface);
      color: var(--text-light);
    }
    #main-content-mensagens.sidebar-collapsed {
      margin-left: 60px;
    }

    /* Estilo para links de clientes */
    .cliente-link {
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .cliente-link:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }
    .cadastrar-dados-link {
      color: #ff9800;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .cadastrar-dados-link:hover {
      color: #ffb74d;
      text-decoration: underline;
    }

    /* Container principal */
    .mensagens-container {
      background-color: var(--bg-card);
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 1.5rem;
    }

    /* === DATA DE SIMULAÇÃO === */
    .simulacao-section {
      background: linear-gradient(135deg, rgba(218,165,32,0.08), rgba(218,165,32,0.02));
      border: 1px solid rgba(218,165,32,0.3);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .simulacao-section label {
      display: block;
      font-weight: bold;
      color: var(--text-accent, #daa520);
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .simulacao-section .sim-desc {
      font-size: 0.8rem;
      color: var(--text-muted, #aaa);
      margin-bottom: 0.8rem;
    }
    #sim-date {
      width: 100%;
      max-width: 300px;
      padding: 0.75rem 1rem;
      font-size: 1.1rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-input, #1a1a1a);
      color: var(--text-light);
    }
    .sim-info {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--text-muted, #aaa);
      font-style: italic;
    }
    .sim-info strong { color: var(--text-accent, #daa520); }

    /* === SEARCH & SORT === */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    #search-input {
      flex: 1;
      max-width: 400px;
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-input);
      color: var(--text-light);
    }

    /* === TABLE === */
    .clientes-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .clientes-table th {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 2px solid var(--border-color);
      color: var(--text-accent);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .clientes-table th:hover { opacity: 0.8; }
    .clientes-table th .sort-icon { font-size: 0.7rem; margin-left: 4px; opacity: 0.5; }
    .clientes-table th.sort-asc .sort-icon::after { content: '▲'; }
    .clientes-table th.sort-desc .sort-icon::after { content: '▼'; }
    .clientes-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    .clientes-table tr:hover {
      background-color: var(--bg-hover);
    }
    .clientes-table tr.search-hidden { display: none; }

    /* === ACTION BUTTONS === */
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin-right: 0.5rem;
      color: var(--text-accent);
      font-size: 1.1rem;
      position: relative;
    }
    .action-btn:hover { color: var(--accent-color); }

    /* Badge */
    .action-btn .badge {
      position: absolute;
      top: -6px; right: -8px;
      background: #e74c3c;
      color: white;
      font-size: 0.6rem;
      font-weight: bold;
      width: 14px; height: 14px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* === MODAL === */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }
    .modal-content {
      background-color: #1e1e1e;
      margin: 5% auto;
      padding: 1.5rem;
      border-radius: 8px;
      width: 85%;
      max-width: 750px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-light);
    }
    .modal-body { margin-bottom: 1.5rem; }
    .modal-body textarea {
      width: 100%;
      min-height: 200px;
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background-color: #2a2a2a;
      color: white;
      resize: vertical;
      font-family: monospace;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    .modal-btn {
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    .cancel-btn {
      background-color: var(--bg-button-secondary);
      color: var(--text-light);
      border: 1px solid var(--border-color);
    }
    .save-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
    }
    .generate-btn {
      background-color: #2ecc71;
      color: white;
      border: none;
    }
    .generate-btn:hover { background-color: #27ae60; }

    /* Report sections in modal */
    .report-section {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .report-section h4 {
      margin: 0 0 0.5rem 0;
      color: var(--text-accent, #daa520);
      font-size: 0.9rem;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .clientes-table { display: block; overflow-x: auto; }
      .modal-content { width: 95%; margin: 5% auto; }
      .controls-row { flex-direction: column; align-items: stretch; }
      #search-input { max-width: 100%; }
    }

    .loading-message, .error-message {
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
    }
    .error-message { color: #e74c3c; }
    .no-clients-message {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <main id="main-content-mensagens">
    <h1>Mensagens WhatsApp - Clientes</h1>
    
    <div class="mensagens-container">
      <!-- Data de Simulação -->
      <div class="simulacao-section">
        <label for="sim-date"><i class="fas fa-calendar-alt"></i> Data de Simulação</label>
        <p class="sim-desc">Defina uma data para simular quais clientes receberão mensagens nesse dia. O sistema analisa o fluxo de caixa e cronograma de cada cliente.</p>
        <input type="date" id="sim-date">
        <div class="sim-info" id="sim-info"></div>
      </div>

      <!-- Busca e filtros -->
      <div class="controls-row">
        <input type="text" id="search-input" placeholder="Buscar por nome ou CPF...">
      </div>
      
      <div id="clientes-table-container">
        <div class="loading-message">Carregando clientes...</div>
      </div>
    </div>

    <!-- Modal de Edição de Mensagem -->
    <div id="mensagem-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-cliente-nome">Mensagem para: </h3>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:0.8rem;">
            <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:0.3rem;">Saudação deste cliente (salva ao clicar Salvar):</label>
            <textarea id="saudacao-texto" rows="2" style="width:100%;resize:vertical;min-height:40px;max-height:100px;padding:0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:0.9rem;" placeholder="Ex: Aqui é o Hugo da HV Saúde Financeira!"></textarea>
          </div>
          <div style="margin-bottom:0.8rem;display:flex;gap:0.5rem;">
            <button class="modal-btn generate-btn" id="btn-generate-report"><i class="fas fa-magic"></i> Gerar Relatório Automático</button>
          </div>
          <textarea id="mensagem-texto" placeholder="Clique em 'Gerar Relatório Automático' ou digite manualmente..."></textarea>
        </div>
        <div class="modal-footer">
          <button class="modal-btn cancel-btn">Cancelar</button>
          <button class="modal-btn save-btn">Salvar</button>
        </div>
      </div>
    </div>
  </main>

  <script src="sidebar.js"></script>

  <script type="module">
    import { supabase } from './supabase.js';
    
    // Sidebar
    if (typeof injectSidebarWithAutoDetection === 'function') {
        injectSidebarWithAutoDetection("main-content-mensagens");
    } else if (typeof injectSidebar === 'function') {
        injectSidebar("main-content-mensagens", "Planejamento");
    }
    
    // === CONSTANTS ===
    const SUPABASE_URL = "https://vbikskbfkhundhropykf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiaWtza2Jma2h1bmRocm9weWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU1MTk5NjEsImV4cCI6MjA2MTA5NTk2MX0.-n-Tj_5JnF1NL2ZImWlMeTcobWDl_VD6Vqp0lxRQFFU";

    // === DOM ===
    const clientesTableContainer = document.getElementById('clientes-table-container');
    const searchInput = document.getElementById('search-input');
    const mensagemModal = document.getElementById('mensagem-modal');
    const modalClienteNome = document.getElementById('modal-cliente-nome');
    const mensagemTexto = document.getElementById('mensagem-texto');
    const closeModalBtn = document.querySelector('.close-modal');
    const cancelBtn = document.querySelector('.cancel-btn');
    const saveBtn = document.querySelector('.save-btn');
    const generateBtn = document.getElementById('btn-generate-report');
    const simDateInput = document.getElementById('sim-date');
    const simInfo = document.getElementById('sim-info');
    const saudacaoTexto = document.getElementById('saudacao-texto');
    
    // Saudação agora é por cliente (salva no Supabase + localStorage como fallback)
    // Será carregada ao abrir o modal de cada cliente
    
    // === STATE ===
    let allClientes = [];
    let clientesData = {}; // { clienteId: { fluxo, acompanhamento, ... } }
    let currentClienteId = null;
    let isAdmin = false;
    let currentUserId = null;
    let currentSortCol = -1;
    let currentSortDir = '';

    // === MENSAGENS HUMORADAS PARA SEMANA LIVRE ===
    const MSGS_SEMANA_LIVRE = [
      'Semana livre de compromissos financeiros! Boas férias pro bolso 😎🏖️',
      'Nada previsto essa semana! Aproveita pra respirar... o bolso agradece kkkk 💸',
      'Semana tranquila! Nem parece segunda-feira né? Aproveita! 😂🙏',
      'Zero compromissos financeiros essa semana! Pode até fingir que é milionário kkk 💰',
      'Semana livre! Se alguém cobrar alguma coisa, diz que tá de férias financeiras 😎',
      'Nenhuma movimentação prevista! Semana pra curtir sem pensar em boleto 🎉',
      'Boa semana! E a melhor notícia: nada pra pagar nem receber kkk... ou será que a melhor seria receber? 🤔',
      'Semana zen! Nenhum compromisso financeiro no radar. Namastê pro bolso 🧘‍♂️💵',
      'Essa semana tá mais vazia que geladeira no fim do mês... só que no bom sentido! 😂',
      'Nada previsto! Semana pra focar no que importa sem preocupação financeira 💪',
      'Semana livre de boletos! Isso sim é qualidade de vida kkk 🌟',
      'Nenhum evento financeiro essa semana! Pode relaxar... até segunda que vem 😅',
      'Tá tudo tranquilo essa semana! Aproveita esse respiro financeiro 🙌',
      'Semana sem movimentações! É tipo feriado pro planejamento financeiro 🌴',
      'Nada no radar essa semana! Bora aproveitar essa paz financeira ✌️',
      'Boa semana! E pode ficar tranquilo que essa semana o fluxo tá de boa 😎👍',
      'Semana sem compromissos! Até o Excel tá de folga kkkk 📊😴',
      'Nada pra essa semana! Bora aproveitar que semana que vem pode ser diferente kkk 😂',
      'Semana livre! Se precisar de mim, tô aqui... mas financeiramente tá tudo certo! 👊',
      'Zero eventos essa semana! Aproveita pra descansar a cabeça... e a carteira 😄💳'
    ];

    // Set default sim date to today
    simDateInput.value = new Date().toISOString().split('T')[0];
    updateSimInfo();

    // === AUTH ===
    async function checkAuth() {
      const nivel = sessionStorage.getItem("nivel");
      const userId = sessionStorage.getItem("id");
      currentUserId = userId;
      if (!nivel) { alert("Acesso não autorizado."); window.location.href = "index.html"; return false; }
      if (nivel === "admin") { isAdmin = true; }
      else if (nivel === "usuario" && sessionStorage.getItem("projeto") !== "Planejamento") {
        alert("Acesso não autorizado para este módulo.");
        window.location.href = "index.html";
        return false;
      }
      return true;
    }

    // === LOAD CLIENTS ===
    async function loadClientes() {
      try {
        clientesTableContainer.innerHTML = '<div class="loading-message">Carregando clientes...</div>';
        const userId = currentUserId;
        const { data, error } = await supabase
          .from('clientes')
          .select('*, dados_cadastrais(*)')
          .eq('projeto', 'Planejamento');
        if (error) throw error;

        if (isAdmin) {
          allClientes = data;
        } else {
          allClientes = data.filter(c => {
            return c.visibility === 'TODOS' || 
                   (c.assigned_to_user_id && c.assigned_to_user_id.trim().toLowerCase() === (userId||'').trim().toLowerCase());
          });
        }
        renderClientesTable(allClientes);
        await loadMensagens();
        await loadSaudacoes();
        // Load data for all clients in background for badge calculation
        loadAllClientData();
      } catch (error) {
        clientesTableContainer.innerHTML = `<div class="error-message">Erro: ${error.message}</div>`;
      }
    }

    // === LOAD MENSAGENS ===
    async function loadMensagens() {
      try {
        if (allClientes.length === 0) return;
        const ids = allClientes.map(c => c.id);
        const { data, error } = await supabase
          .from('mensagens_clientes')
          .select('cliente_id, mensagem')
          .in('cliente_id', ids);
        if (error) throw error;
        if (data) {
          data.forEach(m => {
            const c = allClientes.find(cl => cl.id === m.cliente_id);
            if (c) c.mensagem = m.mensagem;
          });
        }
      } catch (e) { console.error('Erro mensagens:', e); }
    }

    // === LOAD SAUDAÇÕES (por cliente) ===
    async function loadSaudacoes() {
      try {
        if (allClientes.length === 0) return;
        const ids = allClientes.map(c => c.id);
        const { data, error } = await supabase
          .from('saudacoes_clientes')
          .select('cliente_id, saudacao')
          .in('cliente_id', ids);
        if (error) throw error;
        if (data) {
          data.forEach(s => {
            const c = allClientes.find(cl => cl.id === s.cliente_id);
            if (c) c._saudacao = s.saudacao;
          });
        }
      } catch (e) { console.warn('Tabela saudacoes_clientes não encontrada (usando localStorage):', e.message); }
    }

    // === LOAD ALL CLIENT DATA (for report generation) ===
    async function loadAllClientData() {
      try {
        const ids = allClientes.map(c => c.id);
        const { data, error } = await supabase
          .from('ferramentas_dados')
          .select('cliente_id, ferramenta, dados')
          .in('cliente_id', ids)
          .in('ferramenta', ['fluxo', 'acompanhamento', 'fluxo_caixa_avancado', 'particularidades']);
        if (error) throw error;
        
        clientesData = {};
        if (data) {
          data.forEach(row => {
            if (!clientesData[row.cliente_id]) clientesData[row.cliente_id] = {};
            let d = row.dados;
            if (typeof d === 'string') { try { d = JSON.parse(d); } catch(e) { d = null; } }
            
            if (row.ferramenta === 'fluxo' || row.ferramenta === 'fluxo_caixa_avancado') {
              // Fluxo is a LIST of simulations - extract the primary one's payload
              if (!clientesData[row.cliente_id].fluxo && d) {
                let simList = Array.isArray(d) ? d : (d.simulacoes || [d]);
                let primarySim = simList.find(s => s.primary) || simList[0];
                if (primarySim && primarySim.payload) {
                  clientesData[row.cliente_id].fluxo = primarySim.payload;
                  // Extrair trackingData (lançamentos reais)
                  if (primarySim.payload.trackingData) {
                    clientesData[row.cliente_id].trackingData = primarySim.payload.trackingData;
                  }
                } else if (primarySim && primarySim.itens) {
                  clientesData[row.cliente_id].fluxo = primarySim;
                  if (primarySim.trackingData) {
                    clientesData[row.cliente_id].trackingData = primarySim.trackingData;
                  }
                }
              }
            } else if (row.ferramenta === 'particularidades') {
              clientesData[row.cliente_id].particularidades = d;
            } else {
              clientesData[row.cliente_id][row.ferramenta] = d;
            }
          });
        }
        // After loading data, update badges
        updateBadges();
      } catch(e) { console.error('Erro ao carregar dados:', e); }
    }

    // === RENDER TABLE ===
    function renderClientesTable(clientes) {
      if (!clientes || clientes.length === 0) {
        clientesTableContainer.innerHTML = '<div class="no-clients-message">Nenhum cliente encontrado.</div>';
        return;
      }
      const tableHTML = `
        <table class="clientes-table" id="msg-table">
          <thead><tr>
            <th data-col="0">Nome <span class="sort-icon"></span></th>
            <th data-col="1">CPF <span class="sort-icon"></span></th>
            <th data-col="2">WhatsApp <span class="sort-icon"></span></th>
            <th data-col="3">Ações <span class="sort-icon"></span></th>
          </tr></thead>
          <tbody>
            ${clientes.map(cliente => {
              const dc = (cliente.dados_cadastrais || []).find(d => d && d.cliente_id === cliente.id) || {};
              const nome = dc.nome_completo || cliente.nome || 'Nome não disponível';
              const cpf = dc.cpf || '';
              const cpfDisplay = cpf ? cpf : `<a href="cliente-detalhes.html?id=${cliente.id}&edit=true" class="cadastrar-dados-link">Cadastrar</a>`;
              let whats = dc.whatsapp || cliente.whatsapp || '';
              const whatsDisplay = whats ? whats : `<a href="cliente-detalhes.html?id=${cliente.id}&edit=true" class="cadastrar-dados-link">Cadastrar</a>`;
              return `
                <tr data-id="${cliente.id}" data-nome="${nome.toLowerCase()}" data-cpf="${cpf.toLowerCase()}">
                  <td><a href="cliente-detalhes.html?id=${cliente.id}" class="cliente-link">${nome}</a></td>
                  <td>${cpfDisplay}</td>
                  <td>${whatsDisplay}</td>
                  <td>
                    <button class="action-btn edit-msg-btn" data-id="${cliente.id}" title="Editar/Gerar mensagem">
                      <i class="fas fa-comment-alt"></i>
                    </button>
                    <button class="action-btn whats-btn" data-id="${cliente.id}" title="Enviar WhatsApp">
                      <i class="fab fa-whatsapp"></i>
                    </button>
                    <button class="action-btn system-btn" data-id="${cliente.id}" title="Acessar sistema do cliente">
                      <i class="fas fa-external-link-alt"></i>
                    </button>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`;
      clientesTableContainer.innerHTML = tableHTML;

      // Event listeners
      document.querySelectorAll('.edit-msg-btn').forEach(btn => btn.addEventListener('click', handleEditMessage));
      document.querySelectorAll('.whats-btn').forEach(btn => btn.addEventListener('click', openWhatsApp));
      document.querySelectorAll('.system-btn').forEach(btn => btn.addEventListener('click', openClientSystem));
      
      // Sort headers
      document.querySelectorAll('.clientes-table th[data-col]').forEach(th => {
        th.addEventListener('click', () => handleSort(parseInt(th.dataset.col)));
      });

      // Update badges after render
      updateBadges();
    }

    // === SORT ===
    function handleSort(colIdx) {
      const table = document.getElementById('msg-table');
      if (!table) return;
      const ths = table.querySelectorAll('th');
      if (currentSortCol === colIdx) {
        currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSortDir = 'asc';
        currentSortCol = colIdx;
      }
      ths.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
      ths[colIdx].classList.add('sort-' + currentSortDir);

      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        // For actions column (3), sort by badge presence
        if (colIdx === 3) {
          const aBadge = a.cells[colIdx]?.querySelector('.badge') ? 1 : 0;
          const bBadge = b.cells[colIdx]?.querySelector('.badge') ? 1 : 0;
          if (aBadge !== bBadge) return currentSortDir === 'asc' ? bBadge - aBadge : aBadge - bBadge;
          return 0;
        }
        const aT = (a.cells[colIdx]?.textContent || '').trim().toLowerCase();
        const bT = (b.cells[colIdx]?.textContent || '').trim().toLowerCase();
        if (aT < bT) return currentSortDir === 'asc' ? -1 : 1;
        if (aT > bT) return currentSortDir === 'asc' ? 1 : -1;
        return 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }

    // === SEARCH ===
    searchInput.addEventListener('input', () => {
      const term = searchInput.value.toLowerCase();
      const rows = document.querySelectorAll('.clientes-table tbody tr');
      rows.forEach(row => {
        if (!term) { row.classList.remove('search-hidden'); return; }
        const text = row.textContent.toLowerCase();
        row.classList.toggle('search-hidden', !text.includes(term));
      });
    });

    // === SIMULATION DATE ===
    simDateInput.addEventListener('change', () => {
      updateSimInfo();
      updateBadges();
    });

    function updateSimInfo() {
      const d = getSimDate();
      if (!d) { simInfo.textContent = ''; return; }
      const dow = d.getDay();
      const dom = d.getDate();
      const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
      let tags = [];
      if (dom === 1) tags.push('Início do Mês');
      if (dow === 1) tags.push('Início da Semana (Segunda)');
      if (dow === 5) tags.push('Final da Semana (Sexta)');
      if (dom === lastDay) tags.push('Final do Mês');
      if (tags.length === 0) tags.push('Dia comum');
      simInfo.innerHTML = `<strong>${d.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</strong> — ${tags.join(' | ')}`;
    }

    function getSimDate() {
      if (!simDateInput.value) return null;
      return new Date(simDateInput.value + 'T00:00:00');
    }

    // === BADGE SYSTEM ===
    function updateBadges() {
      const simDate = getSimDate();
      if (!simDate) return;
      
      document.querySelectorAll('.edit-msg-btn').forEach(btn => {
        const clienteId = btn.dataset.id;
        const hasMessage = clienteHasMensagem(clienteId, simDate);
        // Remove existing badge
        const existing = btn.querySelector('.badge');
        if (existing) existing.remove();
        if (hasMessage) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = '!';
          btn.appendChild(badge);
        }
      });
    }

    function clienteHasMensagem(clienteId, simDate) {
      const data = clientesData[clienteId];
      if (!data) return false;
      
      const dow = simDate.getDay();
      const dom = simDate.getDate();
      const lastDay = new Date(simDate.getFullYear(), simDate.getMonth() + 1, 0).getDate();
      
      // Always has message on: first day of month, last day of month
      if (dom === 1 || dom === lastDay) return true;
      
      // Check if there are specific fluxo events on this day (including faturas)
      const { itens: fluxoItens, contas: fluxoContas } = getFluxoPayload(data);
      let hasFluxoEvents = false;
      if (fluxoItens.length > 0) {
        const events = getFluxoEventsForDate(fluxoItens, simDate, fluxoContas);
        if (events.length > 0) hasFluxoEvents = true;
      }
      
      // Check cronograma events
      let hasCronoEvents = false;
      if (data.acompanhamento) {
        const cronoEvents = getCronoEventsForDate(data.acompanhamento, simDate);
        if (cronoEvents.length > 0) hasCronoEvents = true;
      }
      
      // Check particularidades datas relevantes (new recurrence model)
      let hasDatasRelevantes = false;
      if (data.particularidades && data.particularidades.datas_relevantes) {
        const datasRel = data.particularidades.datas_relevantes;
        for (const dr of datasRel) {
          if (isDataRelevantOnDate(dr, simDate)) { hasDatasRelevantes = true; break; }
        }
      }
      
      // Segunda-feira: SEMPRE tem badge (se não tiver eventos, gera mensagem de semana livre)
      if (dow === 1) return true;
      
      // Sexta-feira: check if there's weekly content
      if (dow === 5) {
        if (fluxoItens.length > 0) {
          const weekStart = new Date(simDate.getFullYear(), simDate.getMonth(), simDate.getDate() - 4);
          const weekEnd = new Date(simDate);
          const weekEvents = getAllFluxoEvents(fluxoItens, weekStart, weekEnd, fluxoContas);
          if (weekEvents.length > 0) return true;
        }
        if (data.acompanhamento) {
          const weekStart = new Date(simDate.getFullYear(), simDate.getMonth(), simDate.getDate() - 4);
          const weekEnd = new Date(simDate);
          const cronoWeek = getCronoForPeriod(data.acompanhamento, weekStart, weekEnd);
          if (cronoWeek.length > 0) return true;
        }
        if (hasDatasRelevantes) return true;
        return false;
      }
      
      // For other days: only show badge if there are specific day events
      return hasFluxoEvents || hasCronoEvents || hasDatasRelevantes;
    }

    // === HELPER: Extract fluxo payload (itens + contas) from client data ===
    function getFluxoPayload(data) {
      if (!data || !data.fluxo) return { itens: [], contas: [] };
      const fluxo = data.fluxo;
      let itens = [];
      let contas = [];
      // After normalization in loadAllClientData, fluxo should be the payload object
      if (fluxo.itens || fluxo.items) {
        itens = fluxo.itens || fluxo.items || [];
        contas = fluxo.contas || fluxo.accounts || [];
      } else if (Array.isArray(fluxo)) {
        // Fallback: if it's still a list of simulations
        const sim = fluxo.find(s => s.primary) || fluxo[0];
        if (sim && sim.payload) {
          itens = sim.payload.itens || sim.payload.items || [];
          contas = sim.payload.contas || sim.payload.accounts || [];
        }
      }
      return { itens, contas };
    }

    function getFluxoItens(data) {
      return getFluxoPayload(data).itens;
    }

    // === FLUXO EVENTS FOR DATE ===
    function getFluxoEventsForDate(itens, targetDate, contas) {
      const events = [];
      const target = new Date(targetDate);
      target.setHours(0,0,0,0);
      const cartoesMap = buildCartoesMap(contas);

      itens.forEach(item => {
        if (!item.recInicio) return;
        const isCartao = item.formaPagamento && cartoesMap[item.formaPagamento];
        if (isCartao) return; // Itens de cartão não aparecem no dia da compra
        const occs = getOccurrences(item, target, target);
        if (occs.length > 0) {
          events.push(item);
        }
      });

      // Adicionar faturas que vencem neste dia
      const faturas = getFaturasForDate(itens, contas, target);
      faturas.forEach(f => events.push(f));

      return events;
    }

    // === CRONOGRAMA EVENTS FOR DATE ===
    function getCronoEventsForDate(acomp, targetDate) {
      const events = [];
      const target = new Date(targetDate);
      target.setHours(0,0,0,0);
      const targetISO = isoDate(target);
      
      // Check micro passos
      const micros = acomp.microPassos || [];
      micros.forEach(m => {
        if (m.status === 'concluido' || m.status === 'Concluído') return;
        const dates = getItemDates(m, acomp);
        if (!dates) return;
        const { start, end } = dates;
        const label = m.desc || m.nome || 'Micro passo';
        
        // Starting today
        if (start && isoDate(start) === targetISO) {
          events.push({ tipo: 'inicio_micro', nome: label });
        }
        // Ending today
        if (end && isoDate(end) === targetISO) {
          events.push({ tipo: 'conclusao_micro', nome: label });
        }
        // 3 days before deadline
        if (end) {
          const diff = Math.round((end - target) / 86400000);
          if (diff > 0 && diff <= 3) {
            events.push({ tipo: 'prazo_proximo_micro', nome: label, dias: diff });
          }
        }
        // Halfway point
        if (start && end) {
          const total = Math.round((end - start) / 86400000);
          const elapsed = Math.round((target - start) / 86400000);
          if (total > 2 && elapsed === Math.floor(total / 2)) {
            events.push({ tipo: 'metade_micro', nome: label });
          }
        }
      });

      // Check macro estratégias
      const macros = acomp.macroPassos || [];
      macros.forEach(m => {
        if (m.status === 'concluido' || m.status === 'Concluído') return;
        const dates = getItemDates(m, acomp);
        if (!dates) return;
        const { start, end } = dates;
        const label = m.nome || m.desc || 'Macro';
        if (start && isoDate(start) === targetISO) {
          events.push({ tipo: 'inicio_macro', nome: label });
        }
        if (end && isoDate(end) === targetISO) {
          events.push({ tipo: 'conclusao_macro', nome: label });
        }
        if (end) {
          const diff = Math.round((end - target) / 86400000);
          if (diff > 0 && diff <= 3) {
            events.push({ tipo: 'prazo_proximo_macro', nome: label, dias: diff });
          }
        }
      });

      return events;
    }

    // === REPORT GENERATION ===
    async function generateReport(clienteId) {

      const data = clientesData[clienteId];
      const cliente = allClientes.find(c => c.id === clienteId);

      const nome = dc.nome_completo || cliente?.nome || 'Cliente';

        report += `Se puder, atualiza direto no sistema ou me manda um áudio aqui mesmo com o que mudou que eu ajusto pra você 🎤\n`;
        report += `Acesse: https://app.hvsaudefinanceira.com.br\n`;
        report += `Login: *${cliente.login}* | Senha: *${cliente.senha}*\n`;
      } else {
        report += `Se algo tiver diferente do planejado, me manda um áudio aqui mesmo com o que mudou que eu ajusto pra você 🎤\n`;
      }
      report += `\n`;
      
      let hasContent = false;
      
      // === SEÇÃO: INÍCIO DO MÊS ===

        report += `*📆 RELATÓRIO MENSAL - ${simDate.toLocaleDateString('pt-BR', {month:'long', year:'numeric'}).toUpperCase()}*\n\n`;
        
        if (fluxoItens.length > 0) {
          const monthStart = new Date(simDate.getFullYear(), simDate.getMonth(), 1);
          const monthEnd = new Date(simDate.getFullYear(), simDate.getMonth() + 1, 0);
          const monthEvents = getAllFluxoEvents(fluxoItens, monthStart, monthEnd, fluxoContas);
          
          let totalReceitas = 0, totalDespesas = 0, totalInvest = 0;
          monthEvents.forEach(e => {
            if (e.item.tipo === 'entrada') totalReceitas += e.item.valor;
            else if (e.item.subtipo === 'investimento' || e.item.subtipo === 'poupanca') totalInvest += e.item.valor;
            else totalDespesas += e.item.valor;
          });
          
          report += `📊 *Previsão de Fluxo de Caixa do mês:*\n`;
          report += `• Receitas previstas: ${fmtBRL(totalReceitas)}\n`;
          report += `• Despesas previstas: ${fmtBRL(totalDespesas)}\n`;
          report += `• Investimentos/Poupança: ${fmtBRL(totalInvest)}\n`;
          report += `• Saldo previsto: ${fmtBRL(totalReceitas - totalDespesas - totalInvest)}\n\n`;
        }
        
        if (data?.acompanhamento) {

          if (cronoMonth.length > 0) {
            report += `📋 *Cronograma para este mês:*\n`;
            cronoMonth.forEach(e => report += `• ${e.desc}\n`);
            report += '\n';
          }

      }
      
      // === SEÇÃO: FINAL DO MÊS ===
      if (isFinalMes) {
        hasContent = true;

        const monthStart = new Date(simDate.getFullYear(), simDate.getMonth(), 1);
        
        if (fluxoItens.length > 0) {
          const monthEvents = getAllFluxoEvents(fluxoItens, monthStart, simDate, fluxoContas);
          let totalRec = 0, totalDesp = 0, totalInv = 0;
          monthEvents.forEach(e => {
            if (e.item.tipo === 'entrada') totalRec += e.item.valor;
            else if (e.item.subtipo === 'investimento' || e.item.subtipo === 'poupanca') totalInv += e.item.valor;
            else totalDesp += e.item.valor;
          });
          
          report += `💰 *Planejado para o mês:*\n`;
          report += `• Receitas: ${fmtBRL(totalRec)}\n`;
          report += `• Despesas: ${fmtBRL(totalDesp)}\n`;
          report += `• Investimentos: ${fmtBRL(totalInv)}\n`;
          report += `• Saldo: ${fmtBRL(totalRec - totalDesp - totalInv)}\n\n`;
          report += `_Espero que tudo tenha ocorrido conforme planejado! Caso contrário, vamos ajustar juntos._\n\n`;
        }
        
        if (data?.acompanhamento) {
          const updates = getUpdatesInPeriod(data.acompanhamento, monthStart, simDate);
          if (updates.length > 0) {

          const concluidos = micros.filter(m => m.status === 'concluido' || m.status === 'Concluído').length;

              }

          report += `\n*Total entradas: ${fmtBRL(totalEntradas)} | Total saídas: ${fmtBRL(totalSaidas)} | Saldo real: ${fmtBRL(totalEntradas - totalSaidas)}*\n\n`;
        }
      }
      
      // === SEÇÃO: INÍCIO DA SEMANA (Segunda) ===
      if (isSegunda) {
        hasContent = true;
        
        const weekStart = new Date(simDate);
        const weekEnd = new Date(simDate);
        weekEnd.setDate(weekEnd.getDate() + 4);
        
        let hasWeeklyContent = false;
        let weekSection = '';
        
        if (fluxoItens.length > 0) {
          const weekEvents = getAllFluxoEvents(fluxoItens, weekStart, weekEnd, fluxoContas);
          if (weekEvents.length > 0) {

                label += ' 💳';

              if (e.item.tipo === 'entrada') totalRec += e.item.valor; else totalDesp += e.item.valor;
            });
            weekSection += `\n*Saldo semanal previsto: ${fmtBRL(totalRec - totalDesp)}*\n\n`;

        if (data?.acompanhamento) {

          }
        }
        
        if (data?.acompanhamento) {
          const cronoEvents = getCronoEventsForDate(data.acompanhamento, simDate);
          if (cronoEvents.length > 0) {
            hasContent = true;
            daySection += `📋 *Cronograma - eventos de hoje:*\n`;
            cronoEvents.forEach(e => {
              if (e.tipo === 'inicio_micro') daySection += `🟡 Início: ${e.nome}\n`;
              else if (e.tipo === 'conclusao_micro') daySection += `🏁 Prazo de conclusão: ${e.nome}\n`;
              else if (e.tipo === 'prazo_proximo_micro') daySection += `⚠️ ${e.dias} dia(s) para concluir: ${e.nome}\n`;
              else if (e.tipo === 'metade_micro') daySection += `📍 Metade do prazo: ${e.nome}\n`;
              else if (e.tipo === 'inicio_macro') daySection += `🟡 Início de fase: ${e.nome}\n`;
              else if (e.tipo === 'conclusao_macro') daySection += `🏁 Prazo de fase: ${e.nome}\n`;
              else if (e.tipo === 'prazo_proximo_macro') daySection += `⚠️ ${e.dias} dia(s) para fase: ${e.nome}\n`;
            });
            daySection += '\n';
          }
        }
        
        if (daySection) {
          // Only add separator if there were previous sections
          if (isInicioMes || isFinalMes || isSegunda || isSexta) {
            report += `---\n\n`;
            report += `*📅 EVENTOS DE HOJE (${simDate.toLocaleDateString('pt-BR')}):*\n\n`;
          }
          report += daySection;
        }
      }
      
      // === FECHAMENTO ===
      if (!hasContent) {
        // Sem conteúdo: retornar null para indicar que não há relatório
        return null;
      } else if (isFinalMes) {
        report += `Parabéns pelo mês! Vamos pro próximo com ainda mais foco! 🚀`;
      } else if (isSexta) {
        report += `Tudo correu conforme o planejado? Me conta como foi! Bom fim de semana! 🙌`;
      } else if (isSegunda || isInicioMes) {
        report += `Vamos com tudo! Qualquer dúvida, me chama!`;
      } else {
        report += `Qualquer dúvida, me chama!`;
      }
      
      return report;
    }

    // === HELPER: Get all fluxo events in a period ===
    function getAllFluxoEvents(itens, start, end, contas) {
      const events = [];
      const cartoesMap = buildCartoesMap(contas);

      itens.forEach(item => {
        if (!item.recInicio) return;
        const isCartao = item.formaPagamento && cartoesMap[item.formaPagamento];
        if (isCartao) return; // Itens de cartão não entram diretamente
        const occs = getOccurrences(item, start, end);
        occs.forEach(d => events.push({ item, date: d }));
      });

      // Adicionar faturas de cartão que vencem no período
      const faturasEvents = getAllFaturasInPeriod(itens, contas, start, end);
      faturasEvents.forEach(f => events.push(f));

      events.sort((a, b) => a.date - b.date);
      return events;
    }

    // === HELPER: Cronograma items for a month ===
    function getCronoForMonth(acomp, simDate) {
      const monthStart = new Date(simDate.getFullYear(), simDate.getMonth(), 1);
      const monthEnd = new Date(simDate.getFullYear(), simDate.getMonth() + 1, 0);
      return getCronoForPeriod(acomp, monthStart, monthEnd);
    }

    function getCronoForPeriod(acomp, start, end) {
      const results = [];
      const micros = acomp.microPassos || [];
      const macros = acomp.macroPassos || [];
      
      micros.forEach(m => {
        if (m.status === 'concluido' || m.status === 'Concluído') return;
        const dates = getItemDates(m, acomp);
        if (!dates) return;
        const label = m.desc || m.nome || 'Micro passo';
        if (dates.start && dates.start >= start && dates.start <= end) {
          results.push({ desc: `Iniciar: "${label}" (${dates.start.toLocaleDateString('pt-BR')})` });
        }
        if (dates.end && dates.end >= start && dates.end <= end) {
          results.push({ desc: `Concluir: "${label}" (${dates.end.toLocaleDateString('pt-BR')})` });
        }
      });
      
      macros.forEach(m => {
        if (m.status === 'concluido' || m.status === 'Concluído') return;
        const dates = getItemDates(m, acomp);
        if (!dates) return;
        const label = m.nome || m.desc || 'Macro';
        if (dates.start && dates.start >= start && dates.start <= end) {
          results.push({ desc: `Fase inicia: "${label}" (${dates.start.toLocaleDateString('pt-BR')})` });
        }
        if (dates.end && dates.end >= start && dates.end <= end) {
          results.push({ desc: `Fase encerra: "${label}" (${dates.end.toLocaleDateString('pt-BR')})` });
        }
      });
      
      return results;
    }

    // === HELPER: Get updates in period ===
    function getUpdatesInPeriod(acomp, start, end) {
      const results = [];
      const micros = acomp.microPassos || [];
      const objetivos = acomp.objetivos || [];
      
      micros.forEach(m => {
        if (!m.updates) return;
        const label = m.desc || m.nome || 'Micro passo';
        m.updates.forEach(u => {
          const d = new Date(u.data + 'T00:00:00');
          if (d >= start && d <= end) {
            results.push(`${label}: ${u.texto || (u.concluido ? 'Marcado como concluído' : 'Atualização registrada')}`);
          }
        });
      });
      
      objetivos.forEach(o => {
        if (!o.updates) return;
        o.updates.forEach(u => {
          const d = new Date(u.data + 'T00:00:00');
          if (d >= start && d <= end) {
            results.push(`Objetivo "${o.nome}": valor atualizado para ${fmtBRL(u.valor || 0)}`);
          }
        });
      });
      
      return results;
    }

    // === HELPER: Get item dates (prazo system) ===
    function getItemDates(item, acomp) {
      const tipo = item.prazo_tipo;
      
      // New prazo system
      if (tipo === 'duracao') {
        let startDate = item.prazo_inicio ? new Date(item.prazo_inicio + 'T00:00:00') : null;
        if (!startDate) return null;
        const endDate = calcEndDate(startDate, item.dur_qty || 0, item.dur_unit || 'dias');
        return { start: startDate, end: endDate };
      } else if (tipo === 'datas') {
        const s = item.prazo_inicio ? new Date(item.prazo_inicio + 'T00:00:00') : null;
        const e = item.prazo_fim ? new Date(item.prazo_fim + 'T00:00:00') : null;
        return { start: s, end: e };
      } else if (tipo === 'previsao') {
        const e = item.prazo_fim ? new Date(item.prazo_fim + 'T00:00:00') : null;
        return { start: null, end: e };
      }
      
      // Legacy format: item has 'prazo' field (date string) and optionally 'inicio'
      if (item.prazo) {
        const endDate = new Date(item.prazo + 'T00:00:00');
        let startDate = item.inicio ? new Date(item.inicio + 'T00:00:00') : null;
        return { start: startDate, end: endDate };
      }
      
      return null;
    }

    function calcEndDate(start, qty, unit) {
      if (!start || !qty) return null;
      const d = new Date(start);
      if (unit === 'dias') d.setDate(d.getDate() + qty);
      else if (unit === 'uteis') {
        let added = 0;
        while (added < qty) { d.setDate(d.getDate() + 1); if (d.getDay() !== 0 && d.getDay() !== 6) added++; }
      }
      else if (unit === 'semanas') d.setDate(d.getDate() + qty * 7);
      else if (unit === 'meses') d.setMonth(d.getMonth() + qty);
      return d;
    }

    // === HELPER: getOccurrences (same logic as fluxo.html) ===
    function getOccurrences(item, start, end) {
      const dates = [];
      if (!item.recInicio) return dates;
      const refDate = new Date(item.recInicio + 'T00:00');
      
      if (item.recTipo === 'nao' || !item.recTipo) {
        if (refDate >= start && refDate <= end) dates.push(refDate);
        return dates;
      }
      
      let count = 0;
      let maxOcc = Infinity;
      let endDate = new Date(end);
      
      if (item.recFimTipo === 'ocorrencias') maxOcc = item.recFimQty || Infinity;
      if (item.recFimTipo === 'data' && item.recFimData) {
        const fimD = new Date(item.recFimData + 'T00:00');
        if (fimD < endDate) endDate = fimD;
      }
      
      let cur = new Date(refDate);
      while (cur < start) {
        cur = nextOccurrence(cur, item);
        count++;
        if (count >= maxOcc) return dates;
      }
      while (cur <= endDate && count < maxOcc) {
        if (cur >= start) dates.push(new Date(cur));
        cur = nextOccurrence(cur, item);
        count++;
      }
      return dates;
    }

    function nextOccurrence(cur, item) {
      const next = new Date(cur);
      const qty = item.recQty || 1;
      if (item.recTipo === 'dias') next.setDate(next.getDate() + qty);
      else if (item.recTipo === 'uteis') {
        let added = 0;
        while (added < qty) { next.setDate(next.getDate() + 1); if (next.getDay() !== 0 && next.getDay() !== 6) added++; }
      }
      else if (item.recTipo === 'semanas') next.setDate(next.getDate() + qty * 7);
      else if (item.recTipo === 'quinzenas') next.setDate(next.getDate() + qty * 15);
      else if (item.recTipo === 'meses') next.setMonth(next.getMonth() + qty);
      else next.setDate(next.getDate() + 1); // fallback
      return next;
    }

    // === HELPER: Build cartões map from contas array ===
    function buildCartoesMap(contas) {
      const map = {};
      if (!contas || !Array.isArray(contas)) return map;
      contas.forEach(acc => {
        if (acc.tipo === 'cartao') map[acc.id] = acc;
      });
      return map;
    }

    // === HELPER: Determine fatura key (month/year + due date) for a purchase date ===
    function getFaturaKey(purchaseDate, cartao) {
      const dia = purchaseDate.getDate();
      const mes = purchaseDate.getMonth();
      const ano = purchaseDate.getFullYear();
      let fatMes, fatAno;
      if (dia > cartao.fechamento) {
        fatMes = mes + 1; fatAno = ano;
        if (fatMes > 11) { fatMes = 0; fatAno++; }
      } else {
        fatMes = mes; fatAno = ano;
      }
      const maxDia = new Date(fatAno, fatMes + 1, 0).getDate();
      const vencDia = Math.min(cartao.vencimento, maxDia);
      const vencDate = new Date(fatAno, fatMes, vencDia);
      return { key: fatAno + '-' + String(fatMes + 1).padStart(2, '0'), vencDate };
    }

    // === HELPER: Build faturas map for a period ===
    function buildFaturasMap(itens, contas, start, end) {
      const cartoesMap = buildCartoesMap(contas);
      // faturasMap: { cartaoId: { fatKey: { vencDate, total, itens: [{nome, valor, data}] } } }
      const faturasMap = {};

      // We need a wider search window for purchases that generate faturas in our period
      // A purchase up to ~60 days before the period start could generate a fatura in the period
      const searchStart = new Date(start);
      searchStart.setDate(searchStart.getDate() - 60);
      // A purchase in the period could generate a fatura up to ~60 days after
      const searchEnd = new Date(end);
      searchEnd.setDate(searchEnd.getDate() + 60);

      itens.forEach(item => {
        if (!item.recInicio) return;
        if (!item.formaPagamento || !cartoesMap[item.formaPagamento]) return;
        const cartao = cartoesMap[item.formaPagamento];
        const occs = getOccurrences(item, searchStart, searchEnd);
        occs.forEach(d => {
          const fat = getFaturaKey(d, cartao);
          // Only include if fatura vencDate is within our target period
          if (fat.vencDate < start || fat.vencDate > end) return;
          if (!faturasMap[item.formaPagamento]) faturasMap[item.formaPagamento] = {};
          if (!faturasMap[item.formaPagamento][fat.key]) {
            faturasMap[item.formaPagamento][fat.key] = { vencDate: fat.vencDate, total: 0, itens: [] };
          }
          faturasMap[item.formaPagamento][fat.key].total += item.valor;
          faturasMap[item.formaPagamento][fat.key].itens.push({ nome: item.nome, valor: item.valor, data: new Date(d) });
        });
      });

      return faturasMap;
    }

    // === HELPER: Get faturas that fall on a specific date ===
    function getFaturasForDate(itens, contas, targetDate) {
      const target = new Date(targetDate);
      target.setHours(0,0,0,0);
      const targetISO = isoDate(target);
      const cartoesMap = buildCartoesMap(contas);
      const faturasMap = buildFaturasMap(itens, contas, target, target);
      const results = [];

      Object.keys(faturasMap).forEach(cartaoId => {
        const cartao = cartoesMap[cartaoId];
        const faturas = faturasMap[cartaoId];
        Object.keys(faturas).forEach(fatKey => {
          const fat = faturas[fatKey];
          if (isoDate(fat.vencDate) === targetISO) {
            results.push({
              tipo: 'saida',
              subtipo: 'fatura',
              nome: 'Fatura ' + cartao.nome + ' (' + fatKey + ')',
              valor: fat.total,
              _isFatura: true,
              _cartaoNome: cartao.nome,
              _faturaItens: fat.itens
            });
          }
        });
      });

      return results;
    }

    // === HELPER: Get all fatura events in a period (for getAllFluxoEvents) ===
    function getAllFaturasInPeriod(itens, contas, start, end) {
      const cartoesMap = buildCartoesMap(contas);
      const faturasMap = buildFaturasMap(itens, contas, start, end);
      const results = [];

      Object.keys(faturasMap).forEach(cartaoId => {
        const cartao = cartoesMap[cartaoId];
        const faturas = faturasMap[cartaoId];
        Object.keys(faturas).forEach(fatKey => {
          const fat = faturas[fatKey];
          const fatItem = {
            tipo: 'saida',
            subtipo: 'fatura',
            nome: 'Fatura ' + cartao.nome + ' (' + fatKey + ')',
            valor: fat.total,
            _isFatura: true,
            _cartaoNome: cartao.nome,
            _faturaItens: fat.itens
          };
          results.push({ item: fatItem, date: fat.vencDate });
        });
      });

      return results;
    }

    // === HELPER: Check if a data relevante occurs on a given date (supports new recurrence model) ===
    function isDataRelevantOnDate(dr, targetDate) {
      if (!dr.data) return false;
      const target = new Date(targetDate);
      target.setHours(0,0,0,0);
      const targetISO = isoDate2(target);
      const drDate = new Date(dr.data + 'T00:00:00');
      
      const rec = dr.recorrencia || {};
      
      // New recurrence model
      if (rec.tipo === 'repete') {
        const inicio = rec.inicio ? new Date(rec.inicio + 'T00:00:00') : drDate;
        if (target < inicio) return false;
        
        // Check fim (end condition)
        if (rec.fim_tipo === 'data' && rec.fim_data) {
          const fimD = new Date(rec.fim_data + 'T00:00:00');
          if (target > fimD) return false;
        }
        
        const qty = rec.frequencia_qty || 1;
        const unit = rec.frequencia_unit || 'meses';
        
        // Iterate occurrences from inicio to target
        let cur = new Date(inicio);
        let count = 0;
        const maxOcc = (rec.fim_tipo === 'ocorrencias' && rec.fim_ocorrencias) ? rec.fim_ocorrencias : 10000;
        
        while (cur <= target && count < maxOcc) {
          if (isoDate2(cur) === targetISO) return true;
          // Advance to next occurrence
          const next = new Date(cur);
          if (unit === 'dias') next.setDate(next.getDate() + qty);
          else if (unit === 'dias_uteis') {
            let added = 0;
            while (added < qty) { next.setDate(next.getDate() + 1); if (next.getDay() !== 0 && next.getDay() !== 6) added++; }
          }
          else if (unit === 'semanas') next.setDate(next.getDate() + qty * 7);
          else if (unit === 'quinzenas') next.setDate(next.getDate() + qty * 15);
          else if (unit === 'meses') next.setMonth(next.getMonth() + qty);
          else if (unit === 'anos') next.setFullYear(next.getFullYear() + qty);
          else next.setDate(next.getDate() + qty);
          cur = next;
          count++;
        }
        return false;
      }
      
      // Legacy: old format with just "recorrente: true" (annual)
      if (dr.recorrente) {
        return dr.data.slice(5) === targetISO.slice(5); // same month-day
      }
      
      // Non-recurring: exact date match
      return dr.data === targetISO;
    }
    
    // Helper for isDataRelevantOnDate (avoids circular dependency with isoDate below)
    function isoDate2(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    // === HELPERS ===
    function isoDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function fmtBRL(v) {
      return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    // === HELPER: Get real lancamentos (trackingData) for a period ===
    function getLancamentosReais(data, start, end, contas) {
      if (!data || !data.trackingData || !data.trackingData.lancamentos) return [];
      const lancamentos = data.trackingData.lancamentos;
      const cartoesMap = buildCartoesMap(contas);
      const startISO = isoDate(start);
      const endISO = isoDate(end);
      
      // Filtrar lançamentos no período (considerando cartão -> data de vencimento da fatura)
      const resultado = []; // { tipo, descricao, valor, data, pagamento, isCartao, faturaKey }
      const faturas = {}; // { cartaoId_fatKey: { cartaoNome, total, itens: [] } }
      
      lancamentos.forEach(l => {
        if (!l.data || !l.valor) return;
        const val = Math.abs(parseFloat(l.valor) || 0);
        if (!val) return;
        
        // Verificar se é pagamento por cartão
        let cartao = null;
        if (l.pagamento) {
          Object.keys(cartoesMap).forEach(cid => {
            const c = cartoesMap[cid];
            if (c.nome === l.pagamento || c.id === l.pagamento) cartao = c;
          });
        }
        
        if (cartao && l.tipo !== 'entrada') {
          // Cartão: acumular na fatura
          const purchaseDate = new Date(l.data + 'T00:00:00');
          const fat = getFaturaKey(purchaseDate, cartao);
          const fatVencISO = isoDate(fat.vencDate);
          // Só incluir se o vencimento da fatura cai no período
          if (fatVencISO >= startISO && fatVencISO <= endISO) {
            const key = cartao.id + '_' + fat.key;
            if (!faturas[key]) faturas[key] = { cartaoNome: cartao.nome, fatKey: fat.key, total: 0, itens: [] };
            faturas[key].total += val;
            faturas[key].itens.push({ descricao: l.descricao || 'Sem descrição', valor: val });
          }
        } else {
          // Pagamento direto: incluir se a data cai no período
          if (l.data >= startISO && l.data <= endISO) {
            resultado.push({ tipo: l.tipo, descricao: l.descricao || 'Sem descrição', valor: val, data: l.data, pagamento: l.pagamento || '' });
          }
        }
      });
      
      // Adicionar faturas como itens consolidados
      Object.values(faturas).forEach(fat => {
        resultado.push({ tipo: 'despesa', descricao: `Fatura ${fat.cartaoNome} (${fat.fatKey})`, valor: fat.total, data: '', pagamento: 'cartão', _isFatura: true, _faturaItens: fat.itens });
      });
      
      return resultado;
    }

    // === WHATSAPP ===
    function openWhatsApp(event) {
      const clienteId = event.currentTarget.dataset.id;
      const cliente = allClientes.find(c => c.id === clienteId);
      if (!cliente) return;
      const dc = (cliente.dados_cadastrais || []).find(d => d?.cliente_id === clienteId) || {};
      let whatsapp = dc.whatsapp || cliente.whatsapp || '';
      if (!whatsapp) { alert('WhatsApp não cadastrado.'); return; }
      whatsapp = whatsapp.replace(/^\+/, '');
      // Buscar mensagem: primeiro localStorage, depois memória
      const storageKey = 'hv_msg_' + clienteId;
      const mensagem = localStorage.getItem(storageKey) || cliente.mensagem || '';
      const url = `https://api.whatsapp.com/send?phone=${whatsapp}&text=${encodeURIComponent(mensagem)}`;
      window.open(url, '_blank');
    }

    // === ACESSO AO SISTEMA DO CLIENTE ===
    function openClientSystem(event) {
      const clienteId = event.currentTarget.dataset.id;
      const cliente = allClientes.find(c => c.id === clienteId);
      if (!cliente) return;
      const dc = (cliente.dados_cadastrais || []).find(d => d?.cliente_id === clienteId) || {};
      const nome = dc.nome_completo || cliente.nome || 'Cliente';

      sessionStorage.setItem('cliente_nome', nome);
      sessionStorage.setItem('cliente_id_retorno', clienteId);

    // === EDIT MESSAGE ===
    function handleEditMessage(event) {
      const clienteId = event.currentTarget.dataset.id;
      currentClienteId = clienteId;
      const cliente = allClientes.find(c => c.id === clienteId);
      if (!cliente) return;

    // === GENERATE REPORT BUTTON ===
    generateBtn.addEventListener('click', async () => {
      if (!currentClienteId) return;
      generateBtn.disabled = true;
      generateBtn.textContent = 'Gerando...';
      try {
        const report = await generateReport(currentClienteId);
        if (report === null) {
          // Sem conteúdo para relatar
          const simDate = getSimDate();
          const dow = simDate ? simDate.getDay() : -1;
          if (dow === 5) {
            alert('Não há nada para relatar nesta semana para este cliente.');
          } else {
            alert('Não há eventos para relatar nesta data para este cliente.');
          }
          mensagemTexto.value = '';
        } else {
          mensagemTexto.value = report;
        }
      } catch(e) {
        console.error(e);
        mensagemTexto.value = 'Erro ao gerar relatório: ' + e.message;
      }
      generateBtn.disabled = false;
      generateBtn.innerHTML = '<i class="fas fa-magic"></i> Gerar Relatório Automático';
    });

    // === SAVE MESSAGE ===
    async function saveMensagem() {
      if (!currentClienteId) return;
      const mensagem = mensagemTexto.value.trim();
      const saudacao = saudacaoTexto.value.trim();
      
      // Salvar localmente (localStorage) - sempre funciona
      const storageKey = 'hv_msg_' + currentClienteId;
      const saudKey = 'hv_saudacao_' + currentClienteId;
      localStorage.setItem(storageKey, mensagem);
      localStorage.setItem(saudKey, saudacao);
      
      // Atualizar no objeto em memória
      const cliente = allClientes.find(c => c.id === currentClienteId);
      if (cliente) {
        cliente.mensagem = mensagem;
        cliente._saudacao = saudacao;
      }
      
      // Tentar salvar no Supabase também (silencioso, não bloqueia)
      try {
        await supabase
          .from('saudacoes_clientes')
          .upsert({ cliente_id: currentClienteId, saudacao, updated_at: new Date().toISOString() }, { onConflict: 'cliente_id' });
      } catch (e) {
        console.warn('Saudação não salvou no Supabase (salva localmente):', e.message);
      }
      
      try {
        await supabase
          .from('mensagens_clientes')
          .upsert({ cliente_id: currentClienteId, mensagem, updated_at: new Date().toISOString() }, { onConflict: 'cliente_id' });
      } catch (e) {
        console.warn('Mensagem não salvou no Supabase (salva localmente):', e.message);
      }
      
      alert('Mensagem salva!');
      mensagemModal.style.display = 'none';
    }

    // === EVENT LISTENERS ===
    document.addEventListener('DOMContentLoaded', async () => {
      if (await checkAuth()) loadClientes();
    });
    closeModalBtn.addEventListener('click', () => { mensagemModal.style.display = 'none'; });
    cancelBtn.addEventListener('click', () => { mensagemModal.style.display = 'none'; });
    saveBtn.addEventListener('click', saveMensagem);
    window.addEventListener('click', (e) => { if (e.target === mensagemModal) mensagemModal.style.display = 'none'; });
  </script>
</body>
</html>
